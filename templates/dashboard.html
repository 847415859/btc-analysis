/* ══════════════════════════════════════════════════════
   资金费率背离检测
══════════════════════════════════════════════════════ */
function detectFRDivergence(funding, rd) {
  const hist = funding?.historical || [];
  if (hist.length < 20 || !rd) return null;
  const rates       = hist.map(h => h.rate);
  const prev10Avg   = rates.slice(-20,-10).reduce((a,b)=>a+b,0)/10;
  const recent10Avg = rates.slice(-10).reduce((a,b)=>a+b,0)/10;
  const frDelta     = recent10Avg - prev10Avg;
  const allTimeMax  = Math.max(...rates);
  const recentMax   = Math.max(...rates.slice(-10));
  const techScore   = rd.score || 0;
  if (techScore >= 3 && frDelta < -0.003) {
    return { type:'bearish', title:'⚠️ 资金费率顶背离',
      desc:`价格走强但资金费率近10期均值从 ${prev10Avg.toFixed(4)}% 降至 ${recent10Avg.toFixed(4)}%，多头动能衰竭，警惕回调` };
  }
  if (techScore >= 3 && allTimeMax > 0.05 && recentMax < allTimeMax * 0.6) {
    return { type:'bearish', title:'⚠️ 资金费率峰值背离',
      desc:`价格强势但本轮费率峰值 ${recentMax.toFixed(4)}% 远低于历史高点 ${allTimeMax.toFixed(4)}%，多头排列弱于前次` };
  }
  if (techScore <= -3 && frDelta > 0.003) {
    return { type:'bullish', title:'✅ 资金费率底背离',
      desc:`价格下跌但资金费率近10期均值从 ${prev10Avg.toFixed(4)}% 升至 ${recent10Avg.toFixed(4)}%，空头动能减弱，关注反弹` };
  }
  return null;
}

/* ══════════════════════════════════════════════════════
   OI 突破验证信号
══════════════════════════════════════════════════════ */
function getOIBreakoutSignal(funding, rd) {
  const oiA = funding?.oi_analysis;
  if (!oiA || !rd) return null;
  const oiUp = oiA.change_pct >=  2;
  const oiDn = oiA.change_pct <= -2;
  const bull = (rd.score||0) >= 3;
  const bear = (rd.score||0) <= -3;
  if (bull && oiUp) return { label:'✅ 真突破',    color:'#26a69a', score:+1,
    desc:`价格↑ + 持仓量↑(+${oiA.change_pct}%) = 新资金入场，突破可信` };
  if (bull && oiDn) return { label:'⚠️ 轧空行情', color:'#ff9800', score: 0,
    desc:`价格↑ + 持仓量↓(${oiA.change_pct}%) = 空头止损推动，不可持续，警惕回调` };
  if (bear && oiUp) return { label:'🔻 真跌破',    color:'#ef5350', score:-1,
    desc:`价格↓ + 持仓量↑(+${oiA.change_pct}%) = 空单新开，下跌趋势确认` };
  if (bear && oiDn) return { label:'📍 多头离场', color:'#f9a825', score: 0,
    desc:`价格↓ + 持仓量↓(${oiA.change_pct}%) = 多头止损离场，可能接近短期底部` };
  return null;
}

/* ══════════════════════════════════════════════════════
   信号维度分布卡片（评分来源拆解）
══════════════════════════════════════════════════════ */
function buildSignalDimensionCard(rd) {
  if (!rd) return '';
  const C  = s => s >= 2 ? '#26a69a' : s === 1 ? '#66bb6a' : s === -1 ? '#ff9800' : s <= -2 ? '#ef5350' : '#78909c';
  const bar = (s, max) => {
    if (s === null || s === undefined) return '<span style="color:#555;font-size:10px">N/A</span>';
    const w = Math.min(100, Math.abs(s) / (max || 3) * 100);
    const col = C(s);
    const dir = s >= 0 ? 'right' : 'left';
    return `<div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:11px;color:${col};font-weight:600;width:24px;text-align:right">${s>=0?'+':''}${s}</span>
      <div style="flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${w}%;background:${col};border-radius:3px;${dir==='right'?'':'margin-left:auto'}"></div>
      </div>
    </div>`;
  };

  const dims = [
    { label: '趋势组 (MA)',         s: rd.ma_group_score,       max: 3, note: rd.regime?.type === 'trending' ? '趋势市±3' : rd.regime?.type === 'ranging' ? '震荡市±1' : '±2' },
    { label: '布林带 (BB)',          s: rd.bb?.score,            max: 2, note: '' },
    { label: '动量组 (RSI+MACD+KDJ)',s: rd.momentum_group_score, max: 4, note: rd.regime?.type === 'ranging' ? '震荡市±4' : '±3' },
    { label: '量价 (OBV+CVD)',       s: rd.volume_group_score,   max: 2, note: '' },
    { label: '背离 (RSI+OBV Div)',   s: rd.divergence?.score,    max: 3, note: '' },
    { label: 'K线形态 (Patterns)',   s: rd.candle_patterns?.score, max: 4, note: '' },
    { label: '市场结构 (MS+FVG+猎杀)',s: (() => { const ms = rd.market_structure?.score ?? 0; const fvg = rd.fvg_score ?? 0; const hunt = rd.hunt_score_adj ?? 0; return ms + fvg + hunt; })(), max: 4, note: '' },
    { label: '链上验证',             s: rd.onchain?.score,       max: 3, note: '' },
    { label: '持仓量 OI',           s: rd.oi?.score,            max: 2, note: '' },
    { label: '多空比 L/S Ratio',    s: rd.ls_ratio?.score,      max: 3, note: '' },
    { label: '宏观关联 (DXY/NAS)', s: rd.macro?.eligible ? rd.macro?.score : null, max: 2, note: rd.macro?.eligible === false ? '短周期不计' : '' },
    { label: '历史回测',             s: rd.backtest?.score,      max: 2, note: '' },
  ];

  const total = rd.score || 0;
  const maxS  = rd.max_score || 14;
  const pct   = Math.round(Math.abs(total) / maxS * 100);
  const bull  = dims.filter(d => (d.s ?? 0) > 0).length;
  const bear  = dims.filter(d => (d.s ?? 0) < 0).length;

  return `<div class="card">
    <div class="card-title">📊 信号维度分布
      <span style="font-size:10px;color:#546e7a;font-weight:400;margin-left:6px">评分来源拆解</span>
      <span style="margin-left:auto;font-size:11px;color:${C(total)};font-weight:700">${total>=0?'+':''}${total}/${maxS}</span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="flex:1;text-align:center;background:rgba(38,166,154,0.08);padding:5px;border-radius:5px">
        <div style="font-size:18px;font-weight:700;color:#26a69a">${bull}</div>
        <div style="font-size:9px;color:var(--text3)">正向维度</div>
      </div>
      <div style="flex:1;text-align:center;background:rgba(255,255,255,0.03);padding:5px;border-radius:5px">
        <div style="font-size:18px;font-weight:700;color:var(--text2)">${pct}%</div>
        <div style="font-size:9px;color:var(--text3)">方向强度</div>
      </div>
      <div style="flex:1;text-align:center;background:rgba(239,83,80,0.08);padding:5px;border-radius:5px">
        <div style="font-size:18px;font-weight:700;color:#ef5350">${bear}</div>
        <div style="font-size:9px;color:var(--text3)">负向维度</div>
      </div>
    </div>
    <table style="width:100%;border-collapse:collapse">
      ${dims.map(d => `<tr style="border-bottom:1px solid rgba(255,255,255,0.03)">
        <td style="padding:4px 4px;font-size:10px;color:var(--text3);white-space:nowrap">${d.label}${d.note?`<span style="color:#546e7a;font-size:9px"> (${d.note})</span>`:''}</td>
        <td style="padding:4px 4px;width:100px">${bar(d.s, d.max)}</td>
      </tr>`).join('')}
    </table>
  </div>`;
}

/* ══════════════════════════════════════════════════════
   市场机制徽章（ADX + 波动率自适应）
══════════════════════════════════════════════════════ */
function buildRegimeBadge(rd) {
  const reg = rd.regime;
  if (!reg || !reg.type) return '';
  const typeMap = {
    trending:     ['📈 趋势市', '#26a69a', '顺势交易 · 禁用逆势RSI/KDJ信号'],
    ranging:      ['〰️ 震荡市', '#f9a825', '高抛低吸 · 禁用MA突破信号'],
    transitional: ['🔄 过渡区', '#78909c', 'ADX中性 · 谨慎观望'],
    unknown:      ['❓ 未知',   '#555',    '数据不足'],
  };
  const [label, color, tip] = typeMap[reg.type] || typeMap.unknown;
  const slopeVal = reg.adx_slope;
  const slopeStr = slopeVal != null
    ? ` · 斜率${slopeVal >= 0 ? '+' : ''}${slopeVal.toFixed(1)}` : '';
  const slopeColor = slopeVal == null ? 'var(--text3)'
    : slopeVal > 1.5 ? '#26a69a' : slopeVal < -1.5 ? '#ef5350' : 'var(--text3)';
  const slopeIcon = slopeVal == null ? '' : slopeVal > 1.5 ? ' ↑趋势增强' : slopeVal < -1.5 ? ' ↓趋势衰减' : '';
  const adxStr = reg.adx != null
    ? `ADX ${reg.adx}  DI+${reg.di_plus??'—'}  DI-${reg.di_minus??'—'}` : '';
  const volLabel = reg.high_vol ? '⚡高波动' : '💤低波动';
  const volStr   = `${volLabel}(ATR P${Math.round((reg.atr_pct_rank||0)*100)})  BB±${reg.bb_dev}  RSI${reg.rsi_win}`;
  return `
    <div style="margin-bottom:8px">
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px">
        <span style="background:${color}22;color:${color};border:1px solid ${color}55;
                     padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700">${label}</span>
        <span style="color:var(--text3);font-size:10px">${adxStr}</span>
        ${slopeVal != null ? `<span style="font-size:10px;color:${slopeColor};font-weight:600">${slopeStr}${slopeIcon}</span>` : ''}
      </div>
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">${volStr}</div>
      ${reg.adx != null ? (() => {
        const adx = reg.adx;
        // ADX: 0-25 弱, 25-50 中, 50-75 强, 75+ 极强
        const pct  = Math.min(adx / 75 * 100, 100).toFixed(1);
        const adxCol = adx >= 50 ? '#26a69a' : adx >= 25 ? '#f9a825' : '#78909c';
        const adxLbl = adx >= 50 ? '强趋势' : adx >= 25 ? '趋势形成' : '无趋势/盘整';
        return `<div style="margin-bottom:4px">
          <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-bottom:2px">
            <span>ADX趋势强度</span><span style="color:${adxCol};font-weight:600">${adxLbl}</span>
          </div>
          <div style="height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:${adxCol};border-radius:2px;transition:width .4s"></div>
          </div>
        </div>`;
      })() : ''}
      <div style="font-size:10px;color:${color};opacity:0.9">${tip}</div>
    </div>`;
}

/* ══════════════════════════════════════════════════════
   多时间框架共振矩阵
══════════════════════════════════════════════════════ */
function buildMTFMatrix() {
  const MTF_TFS = ['15m','30m','1h','2h','4h','8h','1d','1w'];
  const available = MTF_TFS.filter(tf => analysisData[tf]);
  if (available.length < 2) return '';

  // ── MTF Confluence Score 计算 ───────────────────────────────────────────
  // 各周期权重：越高周期权重越大（机构级视角）
  const TF_WEIGHTS = { '1w': 4.0, '1d': 3.0, '8h': 2.5, '4h': 2.0, '2h': 1.5, '1h': 1.2, '30m': 1.0, '15m': 0.8 };
  let wSum = 0, wScoreSum = 0;
  available.forEach(tf => {
    const rd = analysisData[tf]?.rd;
    if (!rd) return;
    const w    = TF_WEIGHTS[tf] || 1;
    const norm = rd.score / (rd.max_score || 21);  // 归一化到 -1 ~ +1
    wScoreSum += norm * w;
    wSum      += w;
  });
  const confScore = wSum > 0 ? Math.round(wScoreSum / wSum * 100) : 0;  // -100 ~ +100

  // 对齐周期数（与共振方向一致的周期数）
  const alignedTfs = available.filter(tf => {
    const rd = analysisData[tf]?.rd;
    if (!rd) return false;
    return confScore >= 0 ? rd.score > 0 : rd.score < 0;
  });
  const alignedPct = Math.round(alignedTfs.length / (available.length || 1) * 100);

  // 全局存储供其他组件引用
  window._mtfConfluenceScore = confScore;
  window._mtfAlignedPct      = alignedPct;
  window._mtfAlignedCount    = alignedTfs.length;
  window._mtfTotalCount      = available.length;

  // 颜色与标签
  const scoreColor = confScore >= 60 ? '#26a69a' : confScore >= 20 ? '#66bb6a'
                   : confScore <= -60 ? '#ef5350' : confScore <= -20 ? '#ff7043'
                   : '#78909c';
  const scoreLabel = confScore >= 60 ? '强多头共振'  : confScore >= 20 ? '弱多头倾向'
                   : confScore <= -60 ? '强空头共振' : confScore <= -20 ? '弱空头倾向'
                   : '多空分歧';

  // 评级
  const scoreGrade = Math.abs(confScore) >= 70 ? 'A' : Math.abs(confScore) >= 45 ? 'B'
                   : Math.abs(confScore) >= 20 ? 'C' : 'D';
  const gradeColor = scoreGrade === 'A' ? '#26a69a' : scoreGrade === 'B' ? '#66bb6a'
                   : scoreGrade === 'C' ? '#f9a825' : '#78909c';

  // 正负分界gauge条（-100左..0中..+100右）
  const absScore = Math.abs(confScore);
  const barWidth = absScore / 2;
  const barLeft  = confScore >= 0 ? 50 : 50 - barWidth;

  const scoreHeaderHtml = `
    <div style="padding:4px 0 10px;border-bottom:1px solid var(--border2);margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="text-align:center;min-width:60px">
          <div style="font-size:30px;font-weight:800;color:${scoreColor};line-height:1;letter-spacing:-1px">${confScore >= 0 ? '+' : ''}${confScore}</div>
          <div style="font-size:9px;color:var(--text3);margin-top:1px">MTF共振分</div>
        </div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-size:12px;font-weight:700;color:${scoreColor}">${scoreLabel}</span>
            <span style="font-size:10px;background:${gradeColor}22;color:${gradeColor};padding:1px 6px;border-radius:3px;font-weight:700">评级 ${scoreGrade}</span>
          </div>
          <div style="height:7px;background:rgba(255,255,255,0.07);border-radius:4px;position:relative;overflow:hidden">
            <div style="position:absolute;top:0;bottom:0;left:50%;width:1px;background:rgba(255,255,255,0.15)"></div>
            <div style="position:absolute;top:0;bottom:0;left:${barLeft}%;width:${barWidth}%;background:${scoreColor};border-radius:4px;transition:width 0.4s"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:3px">
            <span style="font-size:9px;color:var(--text3)">← 空头 -100</span>
            <span style="font-size:10px;color:var(--text2);font-weight:600">${alignedTfs.length}/${available.length} 周期对齐 (${alignedPct}%)</span>
            <span style="font-size:9px;color:var(--text3)">+100 多头 →</span>
          </div>
        </div>
      </div>
    </div>`;

  const cellColor = s => s >= 2 ? '#26a69a' : s === 1 ? '#4caf50'
                       : s === -1 ? '#ff9800' : s <= -2 ? '#ef5350' : '#555';
  const cellSym   = s => s >= 2 ? '▲▲' : s === 1 ? '▲' : s === -1 ? '▽' : s <= -2 ? '▽▽' : '—';

  const indicators = [
    // P0-C 分组后：趋势/动量/成交量各为独立组，已限幅
    { label: '趋势组',   getScore: rd => rd.ma_group_score ?? (rd.ma||[]).reduce((s,m)=>s+(m.above?1:-1),0) },
    { label: '动量组',   getScore: rd => rd.momentum_group_score ?? 0 },
    { label: '成交量组', getScore: rd => rd.volume_group_score  ?? 0 },
    { label: 'BB',       getScore: rd => rd.bb?.score   ?? 0 },
    { label: 'VWAP',     getScore: rd => rd.vwap ? (rd.vwap.above ? 1 : -1) : null },
  ];

  const bullCnt = {}, bearCnt = {};
  available.forEach(tf => { bullCnt[tf] = 0; bearCnt[tf] = 0; });

  // 表头（列标题可点击切换 TF）
  let rows = `<tr>
    <th style="padding:3px 4px;text-align:left;color:var(--text3);font-weight:400;font-size:10px">指标</th>
    ${available.map(tf =>
      `<th style="padding:3px 2px;text-align:center;color:var(--text3);font-size:10px;cursor:pointer;text-decoration:underline dotted"
           onclick="switchTf('${tf}')">${TF_LABELS[tf]||tf}</th>`
    ).join('')}
  </tr>`;

  // 综合得分行（显示原始数字）
  rows += `<tr style="border-top:1px solid var(--border2)">
    <td style="padding:3px 4px;color:var(--text2);font-size:10px">综合</td>
    ${available.map(tf => {
      const rd = analysisData[tf]?.rd;
      if (!rd) return '<td style="text-align:center;color:#555;font-size:10px">—</td>';
      const s = rd.score, mx = rd.max_score || 14;
      const pct = s / mx;
      const norm = pct >= 0.3 ? 2 : pct >= 0.1 ? 1 : pct <= -0.3 ? -2 : pct <= -0.1 ? -1 : 0;
      if (norm > 0) bullCnt[tf]++; else if (norm < 0) bearCnt[tf]++;
      return `<td style="text-align:center;color:${cellColor(norm)};font-weight:700;font-size:10px">${s>=0?'+':''}${s}</td>`;
    }).join('')}
  </tr>`;

  // MTF 偏差行（仅低于日线的周期显示）
  rows += `<tr style="border-top:1px solid rgba(255,255,255,0.04)">
    <td style="padding:3px 4px;color:var(--text3);font-size:10px">MTF</td>
    ${available.map(tf => {
      const rd = analysisData[tf]?.rd;
      const mtf = rd?.mtf_bias;
      if (!mtf) return '<td style="text-align:center;color:#555;font-size:9px">HTF</td>';
      const dir = mtf.htf_direction;
      const penalty = mtf.penalty || 0;
      if (dir === 'neutral') return '<td style="text-align:center;color:#555;font-size:9px">—</td>';
      const col = penalty !== 0 ? '#ff9800' : (dir === 'bull' ? '#26a69a' : '#ef5350');
      const sym = penalty > 0 ? '⚠️↑' : penalty < 0 ? '⚠️↓' : (dir === 'bull' ? '✅↑' : '✅↓');
      return `<td style="text-align:center;color:${col};font-size:10px" title="${mtf.note||''}">${sym}</td>`;
    }).join('')}
  </tr>`;

  // 各指标行
  indicators.forEach(ind => {
    rows += `<tr style="border-top:1px solid rgba(255,255,255,0.04)">
      <td style="padding:3px 4px;color:var(--text2);font-size:10px">${ind.label}</td>
      ${available.map(tf => {
        const rd = analysisData[tf]?.rd;
        if (!rd) return '<td style="text-align:center;color:#555;font-size:10px">—</td>';
        const s = ind.getScore(rd);
        if (s === null) return '<td style="text-align:center;color:#555;font-size:10px">—</td>';
        if (s > 0) bullCnt[tf]++; else if (s < 0) bearCnt[tf]++;
        return `<td style="text-align:center;color:${cellColor(s)};font-size:11px">${cellSym(s)}</td>`;
      }).join('')}
    </tr>`;
  });

  // 共振强度行
  const convSymbol = (bull, bear) => {
    const ratio = (bull - bear) / (bull + bear || 1);
    if (ratio >= 0.7)  return ['↑↑↑','#26a69a'];
    if (ratio >= 0.3)  return ['↑↑', '#4caf50'];
    if (ratio >= 0.05) return ['↑',  '#8bc34a'];
    if (ratio <= -0.7) return ['↓↓↓','#ef5350'];
    if (ratio <= -0.3) return ['↓↓', '#f44336'];
    if (ratio <= -0.05)return ['↓',  '#ff9800'];
    return ['—','#555'];
  };
  rows += `<tr style="border-top:2px solid var(--border2)">
    <td style="padding:3px 4px;color:var(--text3);font-size:10px;font-weight:600">共振</td>
    ${available.map(tf => {
      const [sym, col] = convSymbol(bullCnt[tf], bearCnt[tf]);
      return `<td style="text-align:center;color:${col};font-weight:700;font-size:11px">${sym}</td>`;
    }).join('')}
  </tr>`;

  // 共振结论文字
  const bullTfs = available.filter(tf => bullCnt[tf] > bearCnt[tf]).length;
  const bearTfs = available.filter(tf => bearCnt[tf] > bullCnt[tf]).length;
  const n = available.length;
  let summary, sumColor;
  if      (bullTfs >= n * 0.7) { summary = `🟢 强多头共振：${bullTfs}/${n} 个时间框架偏多，高胜率做多环境`; sumColor = '#4caf50'; }
  else if (bullTfs >= n * 0.5) { summary = `🟡 弱多头共振：多数时间框架偏多，短周期信号待确认`;           sumColor = '#f9a825'; }
  else if (bearTfs >= n * 0.7) { summary = `🔴 强空头共振：${bearTfs}/${n} 个时间框架偏空，高胜率做空环境`; sumColor = '#ef5350'; }
  else if (bearTfs >= n * 0.5) { summary = `🟠 弱空头共振：多数时间框架偏空，逢反弹关注做空机会`;          sumColor = '#ff9800'; }
  else                          { summary = `⚪ 多空分歧：各周期信号不一致，等待共振确认再入场`;              sumColor = '#78909c'; }

  const maxSide = Math.max(bullTfs, bearTfs);
  const conf = maxSide >= n * 0.7 ? '高' : maxSide >= n * 0.5 ? '中' : '低';
  const confColor = conf === '高' ? '#26a69a' : conf === '中' ? '#f9a825' : '#78909c';

  return `
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>🔀 MTF共振矩阵</span>
      <span style="font-size:10px;color:${confColor};font-weight:600">共振强度: ${conf}</span>
    </div>
    ${scoreHeaderHtml}
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table style="width:100%;border-collapse:collapse;min-width:200px">${rows}</table>
    </div>
    <div style="margin-top:8px;padding:6px 8px;background:rgba(255,255,255,0.03);border-radius:4px;font-size:11px;color:${sumColor};line-height:1.4">${summary}</div>
    <div style="font-size:10px;color:var(--text3);margin-top:4px">↑点击时间框架标题可快速切换</div>
  </div>`;
}

/* ══════════════════════════════════════════════════════
   资深交易员综合研判卡片
══════════════════════════════════════════════════════ */
function buildComprehensiveOpinion(rd, funding) {
  const techScore = rd.score;
  const masAbove  = (rd.ma||[]).filter(m => m.above).length;
  const masTotal  = (rd.ma||[]).length;

  const bullFactors = [], bearFactors = [], warnings = [];

  // ── 均线
  if      (masAbove >= 4) bullFactors.push(`均线多头排列（${masAbove}/${masTotal} 条在价格下方），趋势强劲`);
  else if (masAbove <= 1) bearFactors.push(`均线空头排列（${masTotal-masAbove}/${masTotal} 条在价格上方），下行趋势明确`);
  else if (masAbove >= 3) bullFactors.push(`均线偏多（${masAbove}/${masTotal} 条看多）`);
  else                    bearFactors.push(`均线偏空（${masTotal-masAbove}/${masTotal} 条看空）`);

  // ── RSI
  const rsi = rd.rsi?.val ?? 50;
  if      (rsi >= 70) warnings.push(`RSI ${rsi.toFixed(1)} 超买，短期存在回调压力`);
  else if (rsi <= 30) warnings.push(`RSI ${rsi.toFixed(1)} 超卖，可能出现技术性反弹`);
  else if (rsi >= 55) bullFactors.push(`RSI ${rsi.toFixed(1)} 处于强势区域`);
  else if (rsi <= 45) bearFactors.push(`RSI ${rsi.toFixed(1)} 处于弱势区域`);

  // ── MACD
  const macdScore = rd.macd?.score ?? 0;
  if      (macdScore >= 2)  bullFactors.push('MACD 金叉（刚形成），动能切换为上行');
  else if (macdScore <= -2) bearFactors.push('MACD 死叉（刚形成），动能切换为下行');
  else if (macdScore > 0)   bullFactors.push('MACD 多头趋势延续');
  else if (macdScore < 0)   bearFactors.push('MACD 空头趋势延续');

  // ── KDJ
  const kdjScore = rd.kdj?.score ?? 0;
  if      (kdjScore >= 2)       bullFactors.push('KDJ 金叉，短期买入信号');
  else if (kdjScore <= -2)      bearFactors.push('KDJ 死叉，短期卖出信号');
  else if ((rd.kdj?.k ?? 50) >= 80) warnings.push(`KDJ K值=${(rd.kdj.k).toFixed(1)} 超买区，警惕短线回调`);
  else if ((rd.kdj?.k ?? 50) <= 20) warnings.push(`KDJ K值=${(rd.kdj.k).toFixed(1)} 超卖区，关注反弹机会`);

  // ── OBV
  if (rd.obv?.up) bullFactors.push('OBV 上升，资金持续流入，上涨获量能支撑');
  else            bearFactors.push('OBV 下降，资金流出，需警惕无量上涨');

  // ── VWAP
  if (rd.vwap) {
    if (rd.vwap.above) bullFactors.push(`价格在 VWAP 上方 (+${rd.vwap.diff_pct.toFixed(2)}%)，机构成本线多方占优`);
    else               bearFactors.push(`价格在 VWAP 下方 (${rd.vwap.diff_pct.toFixed(2)}%)，低于机构均成本`);
  }

  // ── 资金费率情绪层（逆向指标）
  let frSignalHtml = '', frScore = 0, frConflict = false;
  if (funding && funding.analysis) {
    const fa = funding.analysis;
    const fr = funding.funding_rate;
    frScore = fa.score;
    if (fa.score <= -1) {
      if (techScore >= 3) frConflict = true;
      warnings.push(`资金费率 ${fr >= 0 ? '+' : ''}${fr}%（${fa.signal}）—— ${fa.interp}`);
    } else if (fa.score >= 1) {
      if (techScore <= -3) frConflict = true;
      bullFactors.push(`资金费率极低 ${fr}%（${fa.signal}）—— ${fa.interp}`);
    } else {
      frSignalHtml = `<div style="color:var(--text3);font-size:11px;margin-top:4px">资金费率 ${fr != null ? (fr >= 0 ? '+' : '') + fr + '%' : '--'} · 中性，不额外干扰趋势</div>`;
    }
    if (fa.percentile >= 90)
      warnings.push(`当前费率处于近${fa.days||166}天历史 ${fa.percentile}% 分位（极高区间），多头拥挤度极高`);
    else if (fa.percentile <= 10)
      warnings.push(`当前费率处于近${fa.days||166}天历史 ${fa.percentile}% 分位（极低区间），空头拥挤度极高`);
  }

  // ── FR 背离信号 ────────────────────────────────────
  const frDiv = detectFRDivergence(funding, rd);
  if (frDiv) {
    if (frDiv.type === 'bearish') warnings.push(frDiv.title + '：' + frDiv.desc);
    else                          bullFactors.push(frDiv.title + '：' + frDiv.desc);
  }

  // ── OI 突破验证信号 ────────────────────────────────
  const oiSigForOpinion = getOIBreakoutSignal(funding, rd);
  let oiScore = 0;
  if (oiSigForOpinion) {
    oiScore = oiSigForOpinion.score;
    if (oiSigForOpinion.score > 0)       bullFactors.push(oiSigForOpinion.label + '：' + oiSigForOpinion.desc);
    else if (oiSigForOpinion.score < 0)  warnings.push(oiSigForOpinion.label + '：' + oiSigForOpinion.desc);
    else if (oiSigForOpinion.label.includes('轧空')) warnings.push(oiSigForOpinion.label + '：' + oiSigForOpinion.desc);
    else                                  bullFactors.push(oiSigForOpinion.label + '：' + oiSigForOpinion.desc);
  }

  // ── 专业级 FR 深度信号（动量 + FR×OI + 时序）─────────────────────────
  const adv = funding?.fr_advanced || {};
  let advScore = 0;

  // FR 动量得分（快速上升 → 警告，快速下降 → 看涨）
  const momScore = adv.momentum?.score ?? 0;
  if (momScore !== 0) {
    advScore += momScore;
    const label = adv.momentum.label + '：' + adv.momentum.desc;
    if (momScore > 0) bullFactors.push(label);
    else              warnings.push(label);
  }

  // FR×OI 复合得分
  const foiScore = adv.fr_oi?.score ?? 0;
  if (foiScore !== 0) {
    advScore += foiScore;
    const label = adv.fr_oi.signal + '：' + adv.fr_oi.desc;
    if (foiScore > 0) bullFactors.push(label);
    else              warnings.push(label);
  }

  // 时序信号得分
  const timScore = adv.timing?.score ?? 0;
  if (timScore !== 0) {
    advScore += timScore;
    const label = adv.timing.signal + '：' + adv.timing.desc;
    if (timScore > 0) bullFactors.push(label);
    else              warnings.push(label);
  }

  // ── 综合判断
  const compositeScore = techScore + frScore + oiScore + advScore;
  let levelColor, levelText, suggest;
  if      (compositeScore >= 8)  { levelColor='#26a69a'; levelText='强烈看多 🚀'; }
  else if (compositeScore >= 4)  { levelColor='#4caf50'; levelText='偏多 📈'; }
  else if (compositeScore >= 1)  { levelColor='#8bc34a'; levelText='温和偏多 🟢'; }
  else if (compositeScore <= -8) { levelColor='#ef5350'; levelText='强烈看空 🔻'; }
  else if (compositeScore <= -4) { levelColor='#f44336'; levelText='偏空 📉'; }
  else if (compositeScore <= -1) { levelColor='#ff7043'; levelText='温和偏空 🔴'; }
  else                           { levelColor='#f9a825'; levelText='中性震荡 ↔️'; }

  const hasFrWarn = (funding?.analysis?.score ?? 0) <= -1;
  const hasFrOpp  = (funding?.analysis?.score ?? 0) >= 1;
  if      (compositeScore >= 8 && !hasFrWarn)  suggest = '可积极做多，止损设于ATR止损位下方，目标看前高或斐波那契扩展位';
  else if (compositeScore >= 8 && hasFrWarn)   suggest = '技术面强势，但费率过热需谨慎；建议轻仓、严格止损，或等费率回落后再加仓';
  else if (compositeScore >= 4)                suggest = '偏多操作，在支撑位附近逢低买入，注意仓位管理';
  else if (compositeScore >= 1)                suggest = '小仓位试多，等待突破确认后加仓，不宜重仓';
  else if (compositeScore <= -8 && !hasFrOpp)  suggest = '可积极做空，止损设于ATR止损位上方，目标看前低或支撑位';
  else if (compositeScore <= -8 && hasFrOpp)   suggest = '技术面偏空，但费率极度负值有反弹风险；建议空单控制仓位，逢弱才加仓';
  else if (compositeScore <= -4)               suggest = '偏空操作，反弹至阻力位附近可轻仓做空';
  else if (compositeScore <= -1)               suggest = '观望为主，避免追多；若有多仓考虑止盈减仓';
  else                                         suggest = '观望为主，等待方向选择，关注关键支撑阻力位的突破方向';

  // 冲突提示
  const conflictHtml = frConflict ? `
    <div style="background:rgba(255,152,0,0.12);border:1px solid rgba(255,152,0,0.3);border-radius:6px;padding:8px 10px;margin-top:8px;font-size:11px;color:#ff9800">
      ⚠️ <b>多空信号分歧</b>：技术指标偏${techScore > 0 ? '多' : '空'}，但资金费率发出${techScore > 0 ? '过热警告' : '逆向看多'}信号。信号分歧时应降低仓位，等待确认。
    </div>` : '';

  // 置信度
  const bullCnt = bullFactors.length, bearCnt = bearFactors.length;
  const dom = Math.max(bullCnt, bearCnt) / (bullCnt + bearCnt + 0.01);
  const conf = dom >= 0.75 ? '高' : (dom >= 0.55 ? '中' : '低');
  const confColor = conf === '高' ? '#26a69a' : (conf === '中' ? '#f9a825' : '#78909c');

  const bullList = bullFactors.length
    ? bullFactors.map(f => `<li style="color:#4caf50;margin-bottom:3px">✓ ${f}</li>`).join('')
    : '<li style="color:var(--text3)">暂无明显看多因素</li>';
  const bearList = bearFactors.length
    ? bearFactors.map(f => `<li style="color:#ef5350;margin-bottom:3px">✗ ${f}</li>`).join('')
    : '<li style="color:var(--text3)">暂无明显看空因素</li>';
  const warnHtml = warnings.length ? `
    <div style="margin-top:8px;padding:8px 10px;background:rgba(255,193,7,0.1);border-left:3px solid #ffc107;border-radius:0 4px 4px 0">
      <div style="font-size:11px;color:#ffc107;font-weight:600;margin-bottom:4px">⚠ 风险提示</div>
      ${warnings.map(w => `<div style="font-size:11px;color:#ffca28;margin-bottom:2px">• ${w}</div>`).join('')}
    </div>` : '';

  return `
  <div class="card" style="border-left:3px solid ${levelColor}">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>🎯 资深交易员综合研判</span>
      <span style="font-size:10px;color:${confColor};font-weight:600">置信度: ${conf}</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2)">
      <div style="font-size:20px;font-weight:700;color:${levelColor}">${levelText}</div>
      <div style="flex:1">
        <div style="font-size:11px;color:var(--text3)">综合评分（技术${techScore >= 0 ? '+' : ''}${techScore} + 情绪${frScore >= 0 ? '+' : ''}${frScore}）</div>
        <div style="font-size:13px;font-weight:600;color:${levelColor}">${compositeScore >= 0 ? '+' : ''}${compositeScore}</div>
      </div>
    </div>
    <div style="margin-top:10px;font-size:12px;line-height:1.5">
      <div style="font-weight:600;color:var(--text1);margin-bottom:4px">建议操作</div>
      <div style="color:${levelColor}">${suggest}</div>
    </div>
    ${conflictHtml}
    ${warnHtml}
    <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div>
        <div style="font-size:11px;color:#4caf50;font-weight:600;margin-bottom:4px">📈 看多因素</div>
        <ul style="list-style:none;padding:0;margin:0;font-size:11px;line-height:1.6">${bullList}</ul>
      </div>
      <div>
        <div style="font-size:11px;color:#ef5350;font-weight:600;margin-bottom:4px">📉 看空因素</div>
        <ul style="list-style:none;padding:0;margin:0;font-size:11px;line-height:1.6">${bearList}</ul>
      </div>
    </div>
    ${frSignalHtml}
  </div>`;
}

/* ══════════════════════════════════════════════════════
   资金费率深度分析模块（FR动量 / FR×OI复合 / 时序 / Basis）
══════════════════════════════════════════════════════ */
function buildFRAdvancedSection(funding) {
  const adv   = funding?.fr_advanced  || {};
  const basis = funding?.basis        || {};
  const mom   = adv.momentum;
  const froi  = adv.fr_oi;
  const timing = adv.timing;

  if (!mom && !froi && !timing && !basis.basis_pct) return '';

  // ── 信号块通用渲染函数 ──────────────────────────────
  function signalBlock(icon, title, label, score, desc, extra = '') {
    const col = score > 0 ? '#26a69a' : score < 0 ? '#ef5350' : '#78909c';
    const bg  = score > 0 ? 'rgba(38,166,154,0.07)' : score < 0 ? 'rgba(239,83,80,0.07)' : 'rgba(255,255,255,0.03)';
    const sc  = score !== 0 ? `<span style="color:${col};font-weight:700;margin-left:6px">${score>0?'+':''}${score}</span>` : '';
    return `<div style="padding:6px 8px;border-radius:5px;background:${bg};border-left:3px solid ${col};margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:3px">
        <span>${icon}</span>
        <span style="color:var(--text2)">${title}</span>
        <span style="color:${col};font-weight:600">${label}</span>
        ${sc}
      </div>
      <div style="font-size:10px;color:var(--text3);line-height:1.5">${desc}</div>
      ${extra}
    </div>`;
  }

  let html = `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border2)">
    <div style="font-size:10px;color:var(--text3);margin-bottom:8px;letter-spacing:.5px">
      ── 专业级资金费率深度分析 ──
    </div>`;

  // ── FR 动量 ──────────────────────────────────────────
  if (mom) {
    // 3期斜率迷你柱状指示器
    const slope = mom.slope_3p || 0;
    const slopeW = Math.min(100, Math.abs(slope) / 0.03 * 100).toFixed(0);
    const slopeCol = slope > 0 ? '#ef5350' : '#26a69a';
    const slopeBar = `<div style="display:flex;align-items:center;gap:4px;margin-top:4px">
      <span style="font-size:9px;color:var(--text3);width:50px">3期斜率</span>
      <div style="flex:1;background:#1a2035;border-radius:2px;height:4px">
        <div style="width:${slopeW}%;height:100%;background:${slopeCol};border-radius:2px"></div>
      </div>
      <span style="font-size:9px;color:${slopeCol};width:50px">${slope>=0?'+':''}${slope.toFixed(5)}%</span>
    </div>
    <div style="font-size:9px;color:var(--text3);margin-top:2px">
      ${mom.consec_up>0?`连续上升 ${mom.consec_up} 期`:''}
      ${mom.consec_down>0?`连续下降 ${mom.consec_down} 期`:''}
      ${mom.is_accel?'· <span style="color:#ff9800">加速中</span>':''}
    </div>`;
    html += signalBlock('📈', 'FR动量', mom.label, mom.score, mom.desc, slopeBar);
  }

  // ── FR × OI 复合 ─────────────────────────────────────
  if (froi) {
    const riskCol = froi.risk_level.includes('极高') ? '#ef5350'
                  : froi.risk_level.includes('高')   ? '#ff9800'
                  : froi.risk_level.includes('低')   ? '#26a69a' : '#78909c';
    const riskBadge = `<span style="font-size:9px;background:${riskCol}22;color:${riskCol};
      border-radius:3px;padding:1px 5px;margin-left:6px">风险: ${froi.risk_level}</span>`;
    html += signalBlock('⚗️', 'FR×OI复合', froi.signal, froi.score, froi.desc, riskBadge);
  }

  // ── FR-价格时序 ──────────────────────────────────────
  if (timing) {
    const chgStr = `FR近8h ${timing.fr_8h_change>=0?'+':''}${timing.fr_8h_change.toFixed(4)}% / OI近8h ${timing.oi_8h_change>=0?'+':''}${timing.oi_8h_change.toFixed(1)}%`;
    const extraTiming = `<div style="font-size:9px;color:var(--text3);margin-top:3px">${chgStr}</div>`;
    html += signalBlock('⏱️', 'FR时序', timing.signal, timing.score, timing.desc, extraTiming);
  }

  // ── 期现价差（Basis）────────────────────────────────
  if (basis && basis.basis_pct != null) {
    const basisCol = basis.basis_pct > 0.3 ? '#ef5350'
                   : basis.basis_pct < -0.3 ? '#26a69a' : '#f9a825';
    const annStr   = basis.annualized_pct != null
      ? `年化 <span style="color:${basisCol};font-weight:600">${basis.annualized_pct>=0?'+':''}${basis.annualized_pct.toFixed(2)}%</span>`
      : '';
    const basisExtra = `
      <div style="display:flex;gap:12px;margin-top:5px;font-size:10px">
        <div><span style="color:var(--text3)">季度合约</span><br>
          <span style="font-size:11px;font-weight:600">${fmt(basis.quarterly_price)}</span>
          <span style="font-size:9px;color:var(--text3);margin-left:4px">${basis.quarterly_symbol||''}</span>
        </div>
        <div><span style="color:var(--text3)">基差</span><br>
          <span style="font-size:11px;font-weight:600;color:${basisCol}">${basis.basis_pct>=0?'+':''}${basis.basis_pct.toFixed(4)}%</span>
        </div>
        <div><span style="color:var(--text3)">年化</span><br>
          <span style="font-size:11px;font-weight:600;color:${basisCol}">${basis.annualized_pct>=0?'+':''}${basis.annualized_pct.toFixed(2)}%</span>
        </div>
      </div>
      <div style="font-size:9px;color:var(--text3);margin-top:3px">
        剩余 ${basis.days_to_expiry||'--'} 天到期 · 正溢价=机构看涨远期 / 贴水=机构看空远期
      </div>`;
    html += signalBlock('📐', '期现价差', basis.signal || '--', 0, '', basisExtra);
  }

  html += '</div>';
  return html;
}


/* ══════════════════════════════════════════════════════
   实时订单簿压力指数卡片
══════════════════════════════════════════════════════ */
function buildOBPressureCard(obp) {
  if (!obp || obp.ratio == null) return '';

  const ratio    = obp.ratio;
  const bid      = obp.bid_pressure  || 0;
  const ask      = obp.ask_pressure  || 0;
  const score    = obp.score         || 0;
  const signal   = obp.signal        || '';
  const velocity = obp.velocity      || 0;
  const ts       = obp.ts            || '';

  // 颜色：按分数
  const scoreColor = score >= 1 ? 'var(--bull)' : score <= -1 ? 'var(--bear)' : 'var(--neutral)';

  // 买卖压力条（百分比）
  const total    = bid + ask;
  const bidPct   = total > 0 ? (bid / total * 100).toFixed(1) : 50;
  const askPct   = total > 0 ? (ask / total * 100).toFixed(1) : 50;

  // 分数徽章
  const scoreBadgeMap = {
     2: { text: '极强买压 +2', bg: '#26a69a33', border: '#26a69a' },
     1: { text: '买压偏强 +1', bg: '#26a69a1a', border: '#26a69a' },
     0: { text: '买卖平衡  0', bg: 'rgba(255,255,255,0.05)', border: '#78909c' },
    '-1': { text: '卖压偏强 -1', bg: '#ef535033', border: '#ef5350' },
    '-2': { text: '极强卖压 -2', bg: '#ef535033', border: '#ef5350' },
  };
  const badge = scoreBadgeMap[String(score)] || scoreBadgeMap['0'];

  // 速度指示（正=买压增强，负=减弱）
  let velHtml = '';
  if (velocity !== 0) {
    const velColor = velocity > 0 ? 'var(--bull)' : 'var(--bear)';
    const velArrow = velocity > 0 ? '▲' : '▼';
    velHtml = `<span style="font-size:10px;color:${velColor};margin-left:6px">${velArrow} ${Math.abs(velocity).toFixed(3)}</span>`;
  }

  return `
  <div class="card">
    <div class="card-title">订单簿压力指数 (OB Pressure)
      ${ts ? `<span style="font-size:9px;color:var(--text3);float:right">${ts}</span>` : ''}
    </div>

    <!-- 压力比率 + 分数徽章 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div>
        <span style="font-size:22px;font-weight:700;color:${scoreColor}">${ratio.toFixed(3)}</span>
        <span style="font-size:10px;color:var(--text3);margin-left:4px">bid/ask</span>
        ${velHtml}
      </div>
      <div style="padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;
                  background:${badge.bg};border:1px solid ${badge.border};color:${badge.border}">
        ${badge.text}
      </div>
    </div>

    <!-- 买卖压力条形图 -->
    <div style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:3px">
        <span style="color:var(--bull)">买压 ${bidPct}%</span>
        <span style="color:var(--bear)">卖压 ${askPct}%</span>
      </div>
      <div style="display:flex;height:8px;border-radius:4px;overflow:hidden">
        <div style="width:${bidPct}%;background:var(--bull);opacity:0.75;transition:width .4s"></div>
        <div style="flex:1;background:var(--bear);opacity:0.75"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:2px">
        <span>${(bid/1000).toFixed(1)}K</span>
        <span>±1% 范围内加权</span>
        <span>${(ask/1000).toFixed(1)}K</span>
      </div>
    </div>

    <!-- 信号文字 -->
    <div style="font-size:11px;color:${scoreColor};padding:4px 6px;border-radius:3px;
                background:${scoreColor === 'var(--neutral)' ? 'rgba(255,255,255,0.04)' : scoreColor.replace(')', ',0.08)').replace('var(', 'rgba(').replace('--bull', '38,166,154').replace('--bear', '239,83,80')}">
      ${signal}
      ${velocity !== 0 ? `&nbsp;·&nbsp;<span style="color:${velocity>0?'var(--bull)':'var(--bear)'}">买压${velocity>0?'增强':'减弱'}中</span>` : ''}
    </div>
  </div>`;
}


/* ══════════════════════════════════════════════════════
   迷你盘口压力卡（精简模式专用）
══════════════════════════════════════════════════════ */
function buildMiniObCard(obp) {
  if (!obp || obp.ratio == null) return '';
  const ratio = obp.ratio;
  const bid   = obp.bid_pressure || 0;
  const ask   = obp.ask_pressure || 0;
  const score = obp.score || 0;
  const total = bid + ask;
  const bidPct = total > 0 ? (bid / total * 100).toFixed(1) : 50;
  const askPct = total > 0 ? (ask / total * 100).toFixed(1) : 50;
  const col = score >= 1 ? 'var(--bull)' : score <= -1 ? 'var(--bear)' : 'var(--neutral)';
  const labelMap = { '2':'极强买压','1':'买压偏强','0':'买卖平衡','-1':'卖压偏强','-2':'极强卖压' };
  const label = (labelMap[String(score)] || '平衡') + (score >= 0 ? ` +${score}` : ` ${score}`);
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
      <span class="card-title" style="margin:0;padding:0;border:0">盘口压力</span>
      <span style="font-size:11px;font-weight:600;color:${col}">${label}</span>
    </div>
    <div style="display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:4px">
      <div style="width:${bidPct}%;background:var(--bull);opacity:0.8;transition:width .4s"></div>
      <div style="flex:1;background:var(--bear);opacity:0.8"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3)">
      <span style="color:var(--bull)">买 ${bidPct}%</span>
      <span style="color:${col};font-weight:600">${ratio.toFixed(3)}</span>
      <span style="color:var(--bear)">卖 ${askPct}%</span>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════
   资金费率详情卡片（含迷你折线图 + 百分位）
══════════════════════════════════════════════════════ */
function buildFundingCard(funding, rd = null) {
  if (!funding || funding.funding_rate == null) return '';
  const fr   = funding.funding_rate;
  const fa   = funding.analysis || {};
  const hist = funding.historical || [];
  const col  = fa.color || '#9e9e9e';

  // ── 资金费率走势图（自适应天数，含均值线 + 时间轴）
  let miniChart = '';
  if (hist.length >= 2) {
    const W = 260, H = 80, P = 4, AXIS = 14;  // AXIS = 底部时间轴预留高度
    const rates  = hist.map(h => h.rate);
    const times  = hist.map(h => h.time);
    const rMin   = Math.min(...rates), rMax = Math.max(...rates);
    const rRange = rMax - rMin || 0.001;
    const avg    = rates.reduce((a, b) => a + b, 0) / rates.length;
    const chartH = H - P - AXIS;  // 折线区域高度

    const toY = v => H - AXIS - P - ((v - rMin) / rRange) * (chartH - P);
    const pts = rates.map((r, i) => {
      const x = P + (i / (rates.length - 1)) * (W - P * 2);
      return `${x.toFixed(1)},${toY(r).toFixed(1)}`;
    }).join(' ');
    const lastPt  = pts.split(' ').at(-1).split(',');
    const lineCol = fr >= 0.05 ? '#ef5350' : (fr <= -0.05 ? '#26a69a' : '#f9a825');

    // 零线（仅当数据跨越正负时）
    const zeroLine = (rMin <= 0 && rMax >= 0)
      ? `<line x1="${P}" y1="${toY(0).toFixed(1)}" x2="${W-P}" y2="${toY(0).toFixed(1)}" stroke="#555" stroke-width="0.6" stroke-dasharray="3,2"/>`
      : '';
    // 均值参考线（橙色虚线）
    const avgLine = `<line x1="${P}" y1="${toY(avg).toFixed(1)}" x2="${W-P}" y2="${toY(avg).toFixed(1)}" stroke="#f9a825" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.7"/>`;

    // 时间轴：均分4个刻度
    const tickIdxs = [0, Math.floor(hist.length/3), Math.floor(hist.length*2/3), hist.length-1];
    const ticksHtml = tickIdxs.map(i => {
      const x = P + (i / (hist.length - 1)) * (W - P * 2);
      const lbl = new Date(times[i]).toLocaleDateString('zh-CN', {month:'numeric', day:'numeric'});
      return `<text x="${x.toFixed(1)}" y="${H - 2}" font-size="8" fill="#555" text-anchor="middle">${lbl}</text>`;
    }).join('');

    const actualDays = Math.round(hist.length * 8 / 24);
    miniChart = `
      <div style="margin:8px 0 4px">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:3px">
          <span>近 ${actualDays} 天资金费率走势（${hist.length} 期）</span>
          <span style="color:#f9a825">均值 ${avg >= 0 ? '+' : ''}${avg.toFixed(4)}%</span>
        </div>
        <svg width="${W}" height="${H}" style="display:block;max-width:100%;border-radius:3px">
          <rect width="${W}" height="${H}" fill="rgba(255,255,255,0.03)" rx="3"/>
          ${zeroLine}
          ${avgLine}
          ${ticksHtml}
          <polyline points="${pts}" fill="none" stroke="${lineCol}" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="3" fill="${lineCol}"/>
        </svg>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:2px">
          <span>最低 ${rMin.toFixed(4)}%</span>
          <span style="color:#f9a825">均值 ${avg >= 0 ? '+' : ''}${avg.toFixed(4)}%</span>
          <span>最高 ${rMax.toFixed(4)}%</span>
        </div>
      </div>`;
  }

  // ── 百分位进度条
  const pct      = fa.percentile ?? 50;
  const pctColor = pct >= 80 ? '#ef5350' : (pct <= 20 ? '#26a69a' : '#f9a825');
  const pctBar   = `
    <div style="margin:6px 0 8px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:2px">
        <span>历史百分位</span><span style="color:${pctColor};font-weight:600">${pct}%</span>
      </div>
      <div style="height:5px;background:var(--border2);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pctColor};border-radius:3px;transition:width .3s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:2px">
        <span>极度偏空</span><span>中性</span><span>极度偏多</span>
      </div>
    </div>`;

  // ── 持仓量
  const oiCoins = funding.open_interest != null
    ? (funding.open_interest >= 1e6
        ? (funding.open_interest/1e6).toFixed(2)+'M'
        : funding.open_interest >= 1e3
          ? (funding.open_interest/1e3).toFixed(1)+'K'
          : funding.open_interest.toFixed(0))
    : '--';
  const oiUsdt = funding.open_interest_usdt != null
    ? (funding.open_interest_usdt >= 1e9
        ? (funding.open_interest_usdt/1e9).toFixed(2)+'B'
        : (funding.open_interest_usdt/1e6).toFixed(1)+'M') + ' USDT'
    : '--';

  // ── 下次结算
  let nextStr = '--';
  if (funding.next_funding_time) {
    const d = new Date(funding.next_funding_time);
    nextStr = d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
  }

  // ── OI 趋势迷你图 ──────────────────────────────────
  let oiChart = '';
  const oiHist = funding.oi_history || [];
  if (oiHist.length >= 5) {
    const W=260, H=50, P=4;
    const ois   = oiHist.map(h => h.oi);
    const oiMin = Math.min(...ois), oiMax = Math.max(...ois);
    const oiRange = oiMax - oiMin || 1;
    const toYoi = v => H - P - ((v - oiMin) / oiRange) * (H - P*2);
    const oiPts = ois.map((v,i) => {
      const x = P + (i/(ois.length-1))*(W-P*2);
      return `${x.toFixed(1)},${toYoi(v).toFixed(1)}`;
    }).join(' ');
    const oiLastPt = oiPts.split(' ').at(-1).split(',');
    const oiA   = funding.oi_analysis || {};
    const oiCol = oiA.change_pct >= 2 ? '#26a69a' : oiA.change_pct <= -2 ? '#ef5350' : '#78909c';
    oiChart = `
      <div style="margin:6px 0 2px">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:2px">
          <span>持仓量趋势（近5天·4H）</span>
          <span style="color:${oiCol}">${oiA.trend||''} ${oiA.change_pct!=null?(oiA.change_pct>=0?'+':'')+oiA.change_pct+'%':''}</span>
        </div>
        <svg width="${W}" height="${H}" style="display:block;max-width:100%;border-radius:3px">
          <rect width="${W}" height="${H}" fill="rgba(255,255,255,0.03)" rx="3"/>
          <polyline points="${oiPts}" fill="none" stroke="${oiCol}" stroke-width="1.5" stroke-linejoin="round" opacity="0.9"/>
          <circle cx="${oiLastPt[0]}" cy="${oiLastPt[1]}" r="3" fill="${oiCol}"/>
        </svg>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${oiA.signal||''}</div>
      </div>`;
  }

  // ── OI 突破信号 ────────────────────────────────────
  const oiSig = getOIBreakoutSignal(funding, rd);
  const oiSigHtml = oiSig ? `
    <div style="margin-top:6px;padding:5px 8px;border-radius:4px;background:${oiSig.color}18;border-left:3px solid ${oiSig.color}">
      <div style="font-size:11px;font-weight:600;color:${oiSig.color}">${oiSig.label}</div>
      <div style="font-size:10px;color:var(--text2);margin-top:2px">${oiSig.desc}</div>
    </div>` : '';

  // ── FR 背离警报 ────────────────────────────────────
  const frDiv = detectFRDivergence(funding, rd);
  const frDivHtml = frDiv ? `
    <div style="margin-top:6px;padding:5px 8px;border-radius:4px;background:${frDiv.type==='bearish'?'#ef535018':'#26a69a18'};border-left:3px solid ${frDiv.type==='bearish'?'#ef5350':'#26a69a'}">
      <div style="font-size:11px;font-weight:600;color:${frDiv.type==='bearish'?'#ef5350':'#26a69a'}">${frDiv.title}</div>
      <div style="font-size:10px;color:var(--text2);margin-top:2px">${frDiv.desc}</div>
    </div>` : '';

  // ── 清算密集区 ─────────────────────────────────────
  const liqClusters = funding.liquidation_clusters || [];
  const liqSource   = funding.liq_source || 'none';
  const liqStats    = funding.liq_stats  || {};
  // 当前周期 rd 中的清算评分（若存在）
  const liqRd       = rd?.liq || {};
  const liqScore    = liqRd.score ?? null;
  const liqSignals  = liqRd.signals || [];
  const slLongOpt   = liqRd.sl_long_opt;
  const slShortOpt  = liqRd.sl_short_opt;

  let liqHTML = '';
  if (liqClusters.length > 0) {
    const currentPrice = rd?.price;

    // 数据来源标注
    const srcLabel = liqSource === 'websocket'
      ? `<span style="color:#26a69a;font-size:9px;cursor:default" title="来自 Binance liquidation WebSocket 实时推送">🟢 实时WS · ${liqStats.hours_covered||0}h/${liqStats.total||0}条</span>`
      : `<span style="color:#f9a825;font-size:9px;cursor:default" title="WebSocket 未连接，当前由 S/R 结构估算，精度有限">🟡 OI估算 · 精度有限</span>`;

    // 评分行
    let scoreRow = '';
    if (liqScore !== null) {
      const sc = liqScore > 0 ? `+${liqScore}` : `${liqScore}`;
      const scCol = liqScore > 0 ? '#26a69a' : liqScore < 0 ? '#ef5350' : '#9e9e9e';
      scoreRow = `<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px">
        <span style="color:var(--text3)">清算区评分</span>
        <span style="color:${scCol};font-weight:700">${sc} 分</span>
      </div>`;
    }

    // 信号列表（只显示非止损建议类）
    const sigRows = liqSignals
      .filter(s => s.type !== 'sl_long_opt' && s.type !== 'sl_short_opt')
      .map(s => {
        const icon = s.score > 0 ? '🟢' : s.score < 0 ? '🔴' : '📌';
        const col  = s.score > 0 ? '#26a69a' : s.score < 0 ? '#ef5350' : '#b0bec5';
        return `<div style="font-size:10px;color:${col};padding:2px 0;line-height:1.4">${icon} ${s.text}</div>`;
      }).join('');

    // 止损建议
    let slRow = '';
    if (slLongOpt || slShortOpt) {
      slRow = `<div style="margin-top:4px;padding:4px 6px;background:rgba(255,255,255,0.04);border-radius:3px;font-size:10px">
        <span style="color:var(--text3)">📌 优化止损参考：</span>
        ${slLongOpt  ? `<span style="color:#26a69a">多单 $${slLongOpt.toLocaleString()}</span>` : ''}
        ${slLongOpt && slShortOpt ? ' · ' : ''}
        ${slShortOpt ? `<span style="color:#ef5350">空单 $${slShortOpt.toLocaleString()}</span>` : ''}
      </div>`;
    }

    // 清算密集区列表
    const rows = liqClusters.map(lc => {
      const isLong = lc.dominant.includes('多头');
      const icon   = isLong ? '🔴' : '🟢';
      const col    = isLong ? '#ef5350' : '#26a69a';
      const dist   = currentPrice ? ((lc.price - currentPrice)/currentPrice*100).toFixed(2) : '0.00';
      const distStr = parseFloat(dist) >= 0 ? `+${dist}%` : `${dist}%`;
      const qtyStr  = lc.source === 'estimated'
        ? `<span style="color:#f9a825">估算</span>`
        : `${lc.count}笔 ${lc.qty.toFixed(1)}张`;
      return `<div style="display:flex;justify-content:space-between;align-items:center;font-size:10px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
        <span style="color:${col}">${icon} $${lc.price.toLocaleString()}</span>
        <span style="color:var(--text3)">${qtyStr}</span>
        <span style="color:var(--text3)">${distStr}</span>
      </div>`;
    }).join('');

    liqHTML = `
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border2)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:10px;color:var(--text3)">🔥 清算密集区</span>
          ${srcLabel}
        </div>
        ${scoreRow}
        ${sigRows}
        ${rows}
        ${slRow}
        <div style="font-size:9px;color:var(--text3);margin-top:4px">🔴多头被爆 · 🟢空头被爆 · 价格磁吸 S/R 已融合</div>
      </div>`;
  }

  return `
  <div class="card">
    <div class="card-title">💰 资金费率 · 市场情绪</div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border2)">
      <div>
        <div style="font-size:22px;font-weight:700;color:${col}">${fr >= 0 ? '+' : ''}${fr.toFixed(4)}%</div>
        <div style="font-size:11px;color:${col};margin-top:2px">${fa.signal || '--'}</div>
      </div>
      <div style="text-align:right;font-size:11px;color:var(--text3);line-height:1.7">
        <div>下次结算 <span style="color:var(--text1)">${nextStr}</span></div>
        <div>${Math.round((hist.length||90)*8/24)}天均值 <span style="color:var(--text1)">${fa.avg_nd != null ? (fa.avg_nd >= 0 ? '+' : '') + fa.avg_nd + '%' : '--'}</span></div>
        <div>费率趋势 <span style="color:var(--text1)">${fa.trend || '--'}</span></div>
      </div>
    </div>
    ${pctBar}
    ${miniChart}
    <div style="font-size:11px;color:var(--text2);line-height:1.55;margin-top:4px;padding:8px;background:rgba(255,255,255,0.03);border-radius:4px">
      <span style="color:${col}">📊 研判：</span>${fa.interp || '--'}
    </div>
    <div style="font-size:11px;color:#b0bec5;margin-top:6px;line-height:1.55">
      <span style="color:var(--text3)">💡 操作建议：</span>${fa.action || '--'}
    </div>
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border2);display:flex;gap:12px">
      <div style="flex:1;text-align:center">
        <div style="font-size:10px;color:var(--text3)">持仓量(张)</div>
        <div style="font-size:12px;font-weight:600">${oiCoins}</div>
      </div>
      <div style="flex:1;text-align:center">
        <div style="font-size:10px;color:var(--text3)">持仓价值</div>
        <div style="font-size:12px;font-weight:600">${oiUsdt}</div>
      </div>
    </div>
    ${oiChart}
    ${oiSigHtml}
    ${frDivHtml}
    ${buildFRAdvancedSection(funding)}
    ${liqHTML}
  </div>`;
}

/* ══════════════════════════════════════════════════════
   流动性猎杀地图卡片
══════════════════════════════════════════════════════ */
function buildStopHuntCard(rd) {
  const zones = rd?.stop_hunt_zones;
  if (!zones || zones.length === 0) return '';
  const price = rd.price || 0;

  // ── 高磁力 + 近距离警报横幅 ──────────────────────────
  const nearHigh = zones.filter(z => z.near_hunt && z.hunt_probability === '高');
  let alertHTML = '';
  if (nearHigh.length > 0) {
    const rows = nearHigh.map(z =>
      `<div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:4px">
        <span>⚠️</span>
        <span style="color:#ffcdd2">${z.warning}</span>
       </div>`
    ).join('');
    alertHTML = `<div style="background:rgba(239,83,80,0.12);border:1px solid rgba(239,83,80,0.35);
      border-radius:6px;padding:8px 10px;margin-bottom:10px;font-size:11px">
      ${rows}
    </div>`;
  }

  // ── 价格梯度 SVG 可视化 ────────────────────────────────
  const svgW = 280, svgH = 200;
  const top5 = zones.slice(0, 5);
  const allP = [price,
    ...top5.map(z => z.hunt_zone_high),
    ...top5.map(z => z.hunt_zone_low),
    ...top5.map(z => z.hunt_target)
  ].filter(v => v && !isNaN(v));
  const pMin = Math.min(...allP) * 0.9985;
  const pMax = Math.max(...allP) * 1.0015;
  const pRange = pMax - pMin || 1;
  const toY = p => Math.round((1 - (p - pMin) / pRange) * (svgH - 30) + 15);

  let svgBody = '';
  // 猎杀色带
  top5.forEach(z => {
    const isLong  = z.type === 'long_stop_hunt';
    const c       = isLong ? '239,83,80' : '38,166,154';
    const alpha   = (0.06 + Math.min(0.18, z.magnetic_strength * 0.016)).toFixed(2);
    const bW      = Math.round(40 + z.magnetic_strength * 12);
    const xL      = Math.round((svgW - bW) / 2);
    const y1      = toY(z.hunt_zone_high), y2 = toY(z.hunt_zone_low);
    const h       = Math.max(4, y2 - y1);
    svgBody += `<rect x="${xL}" y="${y1}" width="${bW}" height="${h}"
      fill="rgba(${c},${alpha})" stroke="rgba(${c},0.35)" stroke-width="0.7" rx="3"/>`;
    // 猎杀目标虚线
    const yt = toY(z.hunt_target);
    svgBody += `<line x1="${xL}" y1="${yt}" x2="${xL+bW}" y2="${yt}"
      stroke="rgba(${c},0.7)" stroke-width="1" stroke-dasharray="4,3"/>`;
    // 推荐挂单圆点
    const ye = toY(z.recommended_entry);
    svgBody += `<circle cx="${svgW/2}" cy="${ye}" r="3.5" fill="rgba(${c},0.9)"/>`;
    // 磁力强度小标签
    svgBody += `<text x="${xL+bW+3}" y="${y1+8}" fill="rgba(${c},0.85)"
      font-size="8" font-family="monospace">⚡${z.magnetic_strength.toFixed(1)}</text>`;
  });
  // 当前价格水平线
  const yc = toY(price);
  svgBody += `<line x1="8" y1="${yc}" x2="${svgW-8}" y2="${yc}"
    stroke="#ffffff" stroke-width="1.8"/>
    <text x="${svgW-6}" y="${yc-3}" fill="#fff" font-size="9"
    text-anchor="end">${fmt(price)}</text>`;
  // 图例
  svgBody += `<text x="6" y="11" fill="rgba(239,83,80,0.7)" font-size="8">🔴 多头止损猎杀区</text>
    <text x="6" y="21" fill="rgba(38,166,154,0.7)" font-size="8">🟢 空头轧仓猎杀区</text>
    <text x="6" y="${svgH-4}" fill="#546e7a" font-size="8">● 推荐挂单  --- 猎杀目标</text>`;

  const svg = `<svg width="${svgW}" height="${svgH}"
    style="display:block;margin:8px auto 12px;border:1px solid #1e2130;border-radius:6px">
    ${svgBody}</svg>`;

  // ── 详细列表 ──────────────────────────────────────────
  const rows = top5.map(z => {
    const isLong  = z.type === 'long_stop_hunt';
    const dColor  = isLong ? 'var(--bear)' : 'var(--bull)';
    const pColor  = z.hunt_probability === '高' ? '#ef5350'
                  : z.hunt_probability === '中' ? '#f9a825' : '#90a4ae';
    const barW    = Math.round(z.magnetic_strength * 7);
    const nearTag = z.near_hunt
      ? `<span style="background:rgba(239,83,80,0.2);color:#ef5350;
           border-radius:3px;padding:0 4px;font-size:9px;margin-left:4px">即将触发</span>`
      : '';
    return `
      <tr>
        <td style="color:${dColor};white-space:nowrap">${z.direction_label}${nearTag}</td>
        <td>${fmt(z.sr_level)}</td>
        <td style="color:${dColor}">${fmt(z.hunt_target)}</td>
        <td>
          <div style="display:flex;align-items:center;gap:4px">
            <div style="width:${barW}px;height:5px;background:${pColor};border-radius:2px;flex-shrink:0"></div>
            <span style="color:${pColor}">${z.magnetic_strength.toFixed(1)}</span>
          </div>
        </td>
        <td style="color:${pColor};font-weight:600">${z.hunt_probability}</td>
        <td style="color:#90caf9">${fmt(z.recommended_entry)}</td>
        <td style="color:var(--text3)">${fmt(z.stop_loss)}</td>
      </tr>
      <tr>
        <td colspan="7" style="font-size:10px;color:#546e7a;padding:1px 4px 7px 12px;
          border-bottom:1px solid #1e2130">${z.action}</td>
      </tr>`;
  }).join('');

  return `<div class="card">
    <div class="card-title">🎯 流动性猎杀地图
      <span style="font-size:10px;color:#546e7a;font-weight:400;margin-left:6px">磁吸效应 · 止损猎杀模型</span>
    </div>
    <div style="font-size:11px;color:#546e7a;line-height:1.6;margin-bottom:8px">
      机构不在支撑买、不在阻力卖——他们在<b style="color:#90a4ae">止损密集区更深处</b>埋单，
      等价格清扫散户止损后收割流动性再反转。<br>
      磁力强度 = S/R权重 × 距离衰减 × OI规模因子（满分10）
    </div>
    ${alertHTML}
    ${svg}
    <div style="overflow-x:auto">
      <table>
        <tr>
          <th>方向</th><th>关键位</th><th>猎杀目标</th>
          <th>磁力</th><th>概率</th><th>推荐挂单</th><th>止损</th>
        </tr>
        ${rows}
      </table>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════
   市场结构卡片（BOS / CHoCH · Market Structure）
══════════════════════════════════════════════════════ */
function buildMarketStructureCard(rd) {
  const ms = rd?.market_structure;
  if (!ms || !ms.structure || ms.structure === 'unknown') return '';
  const isBull = ms.structure === 'bullish';
  const isBear = ms.structure === 'bearish';
  const stColor = isBull ? 'var(--bull)' : isBear ? 'var(--bear)' : 'var(--neutral)';
  const stIcon  = isBull ? '↑' : isBear ? '↓' : '↔';

  // 关键摆动点徽章
  const kh = ms.key_high || {};
  const kl = ms.key_low  || {};
  const khHtml = kh.price ? `<span style="color:var(--bear);font-size:10px">高 ${fmt(kh.price)} (+${kh.dist_pct?.toFixed(2)}%)</span>` : '';
  const klHtml = kl.price ? `<span style="color:var(--bull);font-size:10px">低 ${fmt(kl.price)} (-${Math.abs(kl.dist_pct||0).toFixed(2)}%)</span>` : '';

  // 近期事件列表
  const evRows = (ms.events || []).slice(-4).reverse().map(ev => {
    const isBullEv = ev.direction === 'bullish';
    const isChoCH  = ev.type.startsWith('CHoCH');
    const evColor  = isBullEv ? 'var(--bull)' : 'var(--bear)';
    const evBg     = isChoCH  ? (isBullEv ? 'rgba(38,166,154,0.12)' : 'rgba(239,83,80,0.12)') : 'transparent';
    return `<div style="display:flex;justify-content:space-between;align-items:center;
      padding:3px 6px;margin:2px 0;border-radius:4px;background:${evBg};font-size:10px">
      <span style="color:${evColor};font-weight:${isChoCH?'700':'400'}">${ev.cn}</span>
      <span style="color:var(--text3);margin:0 8px">$${Math.round(ev.price).toLocaleString()}</span>
      <span style="color:var(--text3)">${ev.date?.slice(5,13)||''}</span>
    </div>`;
  }).join('');

  // Score badge
  const sc = ms.structure_score || 0;
  const scColor = sc > 0 ? 'var(--bull)' : sc < 0 ? 'var(--bear)' : 'var(--neutral)';

  return `<div class="card">
    <div class="card-title">📐 市场结构
      <span style="font-size:10px;color:#546e7a;font-weight:400;margin-left:6px">BOS · CHoCH</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div style="font-size:18px;font-weight:700;color:${stColor}">${stIcon} ${ms.structure_cn||''}</div>
      <div style="font-size:11px;background:${stColor}22;color:${stColor};
        border-radius:4px;padding:2px 8px;font-weight:600">${sc>=0?'+':''}${sc} 分</div>
    </div>
    <div style="font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:8px;
      padding:6px 8px;background:rgba(255,255,255,0.03);border-radius:4px">
      ${ms.trading_bias || ''}
    </div>
    <div style="display:flex;gap:12px;margin-bottom:8px">
      ${khHtml}
      ${klHtml}
    </div>
    ${evRows ? `<div style="font-size:10px;color:var(--text3);margin-bottom:4px">近期结构事件</div>${evRows}` : ''}
  </div>`;
}

/* ══════════════════════════════════════════════════════
   链上宏观与真假突破预警卡片 (On-Chain Fakeout Filter)
══════════════════════════════════════════════════════ */
function buildOnChainCard(rd) {
  const oc = rd?.onchain;
  if (!oc) return '';
  
  const scData = oc.stablecoin || {};
  const isFakeout = oc.status === 'fakeout_warning';
  const isConfirmed = oc.status === 'confirmed_breakout' || oc.status === 'confirmed_breakdown';
  
  let statusColor = 'var(--text2)';
  let statusIcon = '⚪';
  if (isFakeout) { statusColor = '#ff9800'; statusIcon = '⚠️'; }
  else if (isConfirmed) { statusColor = '#26a69a'; statusIcon = '✅'; }
  
  const usdtChangeColor = scData.usdt_change_1d_pct > 0 ? 'var(--bull)' : 'var(--bear)';
  const scoreBadge = oc.score !== 0 ? `<span style="margin-left:auto;font-size:11px;color:${oc.score>0?'var(--bull)':'var(--bear)'};font-weight:700">${oc.score>0?'+':''}${oc.score}</span>` : '';

  // 绑定 DOM 元素 (如果页面中有对应的 ID)
  setTimeout(() => {
      const mlEl = document.getElementById('macroLiquidity');
      const mcapEl = document.getElementById('usdtMcap');
      const bsEl = document.getElementById('breakoutStatus');
      const descEl = document.getElementById('onchainDesc');
      
      if (mlEl) mlEl.innerHTML = `<span style="color:${scData.usdt_change_1m_pct > 0 ? 'var(--bull)' : 'var(--bear)'}">${scData.macro_liquidity || '--'}</span>`;
      if (mcapEl) mcapEl.innerHTML = `$${scData.usdt_mcap ? (scData.usdt_mcap/1e9).toFixed(1)+'B' : '--'} (<span style="color:${usdtChangeColor}">${scData.usdt_change_1d_pct > 0 ? '+' : ''}${scData.usdt_change_1d_pct?.toFixed(2)||0}%</span>)`;
      if (bsEl) bsEl.innerHTML = `<span style="color:${statusColor}">${statusIcon} ${oc.status === 'fakeout_warning' ? '诱多/诱空警告' : (isConfirmed ? '真突破确认' : '中性观望')}</span>`;
      if (descEl) descEl.innerText = oc.desc || '--';
  }, 100);

  return `<div class="card" style="${isFakeout ? 'border:1px solid rgba(255,152,0,0.5)' : ''}">
    <div class="card-title">🔗 链上突破验证
      <span style="font-size:10px;color:#546e7a;font-weight:400;margin-left:6px">Fakeout Filter</span>
      ${scoreBadge}
    </div>
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:6px">
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">宏观资金面 (DeFiLlama)</div>
        <div style="font-size:13px;font-weight:600;color:var(--text1)">${scData.macro_liquidity || '--'}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">
          USDT市值: $${scData.usdt_mcap ? (scData.usdt_mcap/1e9).toFixed(1)+'B' : '--'} 
          (<span style="color:${usdtChangeColor}">${scData.usdt_change_1d_pct > 0 ? '+' : ''}${scData.usdt_change_1d_pct?.toFixed(2)||0}%</span>)
        </div>
      </div>
      
      <div style="background:rgba(255,255,255,0.03);padding:8px;border-radius:6px">
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">当前突破状态</div>
        <div style="font-size:13px;font-weight:600;color:${statusColor}">${statusIcon} ${oc.status === 'fakeout_warning' ? '诱多/诱空警告' : (isConfirmed ? '真突破确认' : '中性观望')}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">
          技术面侦测: ${oc.tech_signal_detected === 'breakout_up' ? '向上突破' : (oc.tech_signal_detected === 'breakdown_down' ? '向下破位' : '无明显突破')}
        </div>
      </div>
    </div>
    
    <div style="font-size:11px;color:${isFakeout ? '#ffb74d' : 'var(--text2)'};line-height:1.5;padding:6px;background:${isFakeout ? 'rgba(255,152,0,0.1)' : 'rgba(255,255,255,0.02)'};border-radius:4px">
      ${oc.desc || '--'}
    </div>
  </div>`;
}
