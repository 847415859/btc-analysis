<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CryptoTA · 多币种技术分析</title>

<!-- PWA -->
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/icon.svg" type="image/svg+xml">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CryptoTA">
<meta name="theme-color" content="#131722">

<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
/* ══════════════════════════════════════
   CSS 变量 & 重置
══════════════════════════════════════ */
:root {
  --bg:      #0e1117;
  --bg2:     #131722;
  --bg3:     #1a2035;
  --border:  #2a2e39;
  --border2: #1e2130;
  --text:    #d1d4dc;
  --text2:   #90a4ae;
  --text3:   #546e7a;
  --bull:    #26a69a;
  --bear:    #ef5350;
  --neutral: #f9a825;
  --blue:    #90caf9;
  --accent:  #29b6f6;
  --nav-h:   56px;
  --safe-b:  env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; font-size: 13px; }

/* ══════════════════════════════════════
   共用组件
══════════════════════════════════════ */
.bull    { color: var(--bull);    }
.bear    { color: var(--bear);    }
.neutral { color: var(--neutral); }

.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite; margin-bottom: 12px;
}
@keyframes spin    { to { transform: rotate(360deg); } }
@keyframes pulse   { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

.loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text2);
}
.price-change.up   { background: rgba(38,166,154,.15); color: var(--bull); }
.price-change.down { background: rgba(239,83,80,.15);  color: var(--bear); }

/* ══════════════════════════════════════
   ── 桌面端布局（原有逻辑，完整保留）──
══════════════════════════════════════ */
.desktop-header {
  background: linear-gradient(90deg, var(--bg2), var(--bg3));
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.header-logo { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -.3px; display: flex; align-items: center; gap: 10px; }
.symbol-select {
  background: var(--bg); border: 1px solid var(--border); color: #fff;
  padding: 4px 8px; border-radius: 4px; font-size: 14px; font-weight: 600;
  outline: none; cursor: pointer;
}
.price-main   { font-size: 28px; font-weight: 700; color: #fff; margin-left: 6px; }
.price-change { font-size: 14px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.header-stats { display: flex; gap: 16px; margin-left: 12px; }
.header-stat  { display: flex; flex-direction: column; }
.header-stat .lbl { font-size: 10px; color: var(--text3); }
.header-stat .val { font-size: 12px; color: var(--text2); font-weight: 600; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.countdown-box   { text-align: center; }
.countdown-label { font-size: 10px; color: var(--text3); }
.countdown-val   { font-size: 18px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
.update-time     { font-size: 11px; color: var(--text3); }
.updating-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--neutral); display: none;
  animation: pulse 1s infinite;
}
.updating-dot.active { display: inline-block; }

.desktop-summary-bar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 8px 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.summary-label { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; margin-right: 4px; }
.tf-chip {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); cursor: pointer; transition: all .15s;
  display: inline-flex; align-items: center; gap: 5px;
}
.tf-chip:hover  { border-color: var(--blue); }
.tf-chip.active { border-color: var(--blue); background: rgba(144,202,249,.08); }
.tf-chip .chip-score  { font-size: 11px; opacity: .85; }
.chip-bull    { color: var(--bull); }
.chip-bear    { color: var(--bear); }
.chip-neutral { color: var(--neutral); }

/* 桌面主区域 */
.desktop-main { display: flex; height: calc(100vh - 120px); overflow: hidden; }
.sidebar {
  width: 320px; min-width: 280px; flex-shrink: 0;
  overflow-y: auto; border-right: 1px solid var(--border); background: var(--bg2);
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
/* ── 精简/完整模式 ─────────────────────────────────── */
.focus-mode .detail-card { display: none !important; }
#focusBtn {
  font-size:11px; padding:3px 12px; border-radius:12px;
  border:1px solid var(--border); background:var(--bg3);
  color:var(--text2); cursor:pointer; transition:all .15s; white-space:nowrap;
}
#focusBtn.active { background:var(--accent); color:#0e1117; border-color:var(--accent); font-weight:600; }
/* ── Toast 通知 ─────────────────────────────────────────── */
#toast-container { position:fixed; bottom:72px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column-reverse; gap:6px; pointer-events:none; }
.toast-item { padding:7px 14px; border-radius:8px; font-size:12px; font-weight:500; opacity:0; transform:translateY(8px); transition:opacity .2s,transform .2s; pointer-events:auto; white-space:nowrap; max-width:280px; }
.toast-item.show { opacity:1; transform:translateY(0); }
.toast-bull { background:rgba(38,166,154,0.93); border:1px solid #26a69a; color:#fff; }
.toast-bear { background:rgba(239,83,80,0.93); border:1px solid #ef5350; color:#fff; }
.toast-warn { background:rgba(249,168,37,0.93); border:1px solid #f9a825; color:#000; }
/* ── 交易时段时钟 ─────────────────────────────────────── */
#sessionClock { display:flex; align-items:center; gap:4px; flex-wrap:wrap; justify-content:flex-end; margin-bottom:3px; }
.sess-tag { font-size:10px; padding:2px 7px; border-radius:3px; font-weight:600; line-height:1.4; }
.sess-overlap { font-size:10px; color:#ce93d8; font-weight:700; margin-right:2px; }
/* ── 分析面板警告横幅 ─────────────────────────────────── */
.alert-banner { margin:4px 8px 0; padding:5px 10px; border-radius:5px; font-size:11px; font-weight:500; line-height:1.4; }
/* ── 仓位计算器面板 ───────────────────────────────────── */
#posCalcPanel { position:fixed; bottom:0; left:0; right:0; max-width:440px; margin:0 auto;
  background:var(--bg2); border-top:1px solid var(--border); border-radius:12px 12px 0 0;
  padding:16px 16px 24px; z-index:8000; transform:translateY(100%); transition:transform .25s ease;
  box-shadow:0 -4px 24px rgba(0,0,0,.5); }
#posCalcPanel.open { transform:translateY(0); }
#posCalcPanel input { width:100%; background:#0d1117; border:1px solid var(--border);
  border-radius:5px; color:var(--text); font-size:13px; padding:6px 8px; box-sizing:border-box;
  outline:none; }
#posCalcPanel input:focus { border-color:var(--accent); }
.calc-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.calc-label { font-size:10px; color:var(--text3); margin-bottom:3px; }
.calc-result { background:#0d1117; border-radius:6px; padding:10px 12px; margin-top:8px; }
.calc-result-row { display:flex; justify-content:space-between; align-items:center;
  font-size:12px; padding:3px 0; border-bottom:1px solid var(--border2); }
.calc-result-row:last-child { border:0; }
#calcCloseBtn { position:absolute; top:12px; right:14px; background:none; border:none;
  color:var(--text3); font-size:18px; cursor:pointer; padding:0; line-height:1; }

.card { border-bottom: 1px solid var(--border2); padding: 12px 14px; }
.card-title { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
.card table { width: 100%; border-collapse: collapse; }
.card th { font-size: 10px; color: var(--text3); font-weight: 500; padding: 3px 4px; text-align: left; border-bottom: 1px solid var(--border2); }
.card td { padding: 4px 4px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,.03); }
.card tr:last-child td { border-bottom: none; }
.row       { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.row-label { color: var(--text3); min-width: 85px; font-size: 12px; }
.row-val   { font-weight: 600; font-size: 12px; }
.row-sig   { font-size: 11px; }
.overall-box {
  padding: 10px 12px; border-radius: 6px; margin-bottom: 8px;
  background: rgba(255,255,255,.03); border-left: 4px solid var(--neutral);
}
.overall-text { font-size: 15px; font-weight: 700; }
.score-bar { display: flex; gap: 3px; align-items: center; margin-top: 5px; }
.score-bar-bull  { height: 6px; background: var(--bull); border-radius: 2px; transition: width .5s; }
.score-bar-bear  { height: 6px; background: var(--bear); border-radius: 2px; transition: width .5s; }
.score-bar-label { font-size: 10px; color: var(--text3); }
.sr-badge { font-size: 9px; padding: 1px 4px; border-radius: 3px;
  background: rgba(255,255,255,0.07); color: var(--text3);
  letter-spacing: .3px; white-space: nowrap; }

/* 流动性猎杀地图 */
.hunt-alert {
  background: rgba(239,83,80,0.10); border: 1px solid rgba(239,83,80,0.3);
  border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; font-size: 11px;
}
.hunt-zone-high { color: var(--bear); font-weight: 600; }
.hunt-zone-mid  { color: var(--neutral); font-weight: 600; }
.hunt-zone-low  { color: var(--text2); }

.chart-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.chart-toolbar {
  padding: 6px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; background: var(--bg2);
}
.chart-toolbar span { font-size: 11px; color: var(--text3); }
.overlay-btn { font-size:10px; padding:2px 7px; border-radius:4px; border:1px solid var(--border2); background:var(--bg3); color:var(--text3); cursor:pointer; transition:all .12s; white-space:nowrap; }
.overlay-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(41,182,246,0.08); }
#quickStats { margin-left:auto; display:flex; align-items:center; gap:10px; font-size:11px; color:var(--text3); flex-shrink:0; }
#chart-desktop { flex: 1; width: 100%; position: relative; }

/* ══════════════════════════════════════
   ── 手机端专属布局 ──
   默认隐藏，屏幕 < 768px 时显示
══════════════════════════════════════ */
.mobile-only    { display: none; }
.desktop-only   { display: contents; }

@media (max-width: 767px) {
  /* 整体结构 */
  html, body { overflow: hidden; }

  .desktop-only   { display: none !important; }
  .mobile-only    { display: flex; }

  /* ── 顶部 App Header ── */
  .app-header {
    flex-direction: column; gap: 4px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px 6px;
    padding-top: calc(8px + env(safe-area-inset-top, 0px));
    flex-shrink: 0;
  }
  .app-header-row1 {
    display: flex; align-items: center; gap: 10px; width: 100%;
  }
  .app-symbol-select {
    background: transparent; border: none; color: var(--accent);
    font-size: 16px; font-weight: 700; outline: none; cursor: pointer;
  }
  .app-price-big   { font-size: 22px; font-weight: 700; color: #fff; margin-left: auto; }
  .app-price-chg   { font-size: 12px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
  .app-header-row2 { display: flex; align-items: center; gap: 14px; width: 100%; }
  .app-stat        { display: flex; flex-direction: column; }
  .app-stat .lbl   { font-size: 9px; color: var(--text3); }
  .app-stat .val   { font-size: 11px; color: var(--text2); font-weight: 600; }
  .app-countdown   { margin-left: auto; text-align: right; }
  .app-countdown .lbl { font-size: 9px; color: var(--text3); }
  .app-countdown .val { font-size: 14px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .app-updating-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--neutral); display: none;
    animation: pulse 1s infinite; flex-shrink: 0;
  }
  .app-updating-dot.active { display: inline-block; }

  /* ── 周期切换条 ── */
  .app-tf-bar {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 4px 10px; overflow-x: auto; gap: 6px; flex-shrink: 0;
    scrollbar-width: none;
  }
  .app-tf-bar::-webkit-scrollbar { display: none; }
  .app-tf-chip {
    padding: 3px 12px; border-radius: 14px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: all .15s;
  }
  .app-tf-chip.active { border-color: var(--accent); background: rgba(41,182,246,.1); color: var(--accent); }

  /* ── 主内容区 ── */
  .app-main {
    flex: 1; min-height: 0; overflow: hidden; position: relative;
    flex-direction: column;
  }
  .tab-panel { display: none; flex-direction: column; height: 100%; overflow: hidden; }
  .tab-panel.active { display: flex; }

  /* 图表面板 */
  #panel-chart  { background: var(--bg); }
  #chart-main   { flex: 1; width: 100%; min-height: 0; position: relative; }
  #chart-sub    { flex: 1; width: 100%; min-height: 0; position: relative; }

  /* 分析面板 */
  #panel-analysis, #panel-signals { overflow-y: auto; background: var(--bg2); }
  #panel-analysis::-webkit-scrollbar,
  #panel-signals::-webkit-scrollbar { width: 3px; }

  /* ── 底部导航 ── */
  .bottom-nav {
    background: var(--bg2); border-top: 1px solid var(--border);
    display: flex !important; /* override .mobile-only */
    padding-bottom: var(--safe-b);
    flex-shrink: 0; height: calc(var(--nav-h) + var(--safe-b));
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px; border: none; background: none;
    color: var(--text3); font-size: 10px; font-weight: 600; cursor: pointer;
    transition: color .15s; padding: 6px 0;
  }
  .nav-item svg      { width: 22px; height: 22px; }
  .nav-item.active   { color: var(--accent); }
  .nav-item.active svg path,
  .nav-item.active svg rect,
  .nav-item.active svg polyline { stroke: var(--accent); }

  /* 信号面板 Grid */
  .signals-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px;
  }
  .sig-card {
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px;
    padding: 10px 12px; cursor: pointer;
  }
  .sig-card-tf   { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; }
  .sig-card-score{ font-size: 20px; font-weight: 700; margin: 4px 0 2px; }
  .sig-card-text { font-size: 11px; }
  .sig-bar       { display: flex; gap: 2px; margin-top: 6px; height: 4px; border-radius: 2px; overflow: hidden; }
  .sig-bar-bull  { background: var(--bull); border-radius: 2px; }
  .sig-bar-bear  { background: var(--bear); border-radius: 2px; }

  .sr-section    { padding: 12px; }
  .sr-section h3 { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .sr-row        { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border2); font-size: 12px; }
  .sr-row:last-child { border-bottom: none; }
}

/* ══════════════════════════════════════
   图表 Loading 覆盖层（桌面 + 手机共用）
══════════════════════════════════════ */
.chart-loading-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 10; background: var(--bg2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text2);
}
.urgency-badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; margin-left:6px; vertical-align:middle; }
.urgency-badge.urgent  { background:rgba(239,83,80,0.22); color:#ef5350; animation: pulse 1.4s ease-in-out infinite; }
.urgency-badge.near    { background:rgba(255,193,7,0.18);  color:#ffc107; }
.urgency-badge.pending { background:rgba(66,165,245,0.18); color:#42a5f5; }
.urgency-badge.limit   { background:rgba(102,187,106,0.18);color:#66bb6a; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════
     桌面端布局（原有完整逻辑，手机上被 .desktop-only 隐藏）
══════════════════════════════════════════════════════ -->
<div class="desktop-only">

  <!-- 顶部头 -->
  <div class="desktop-header">
    <div class="header-logo">
      <select id="symbolSelect" class="symbol-select"></select>
    </div>
    <div id="priceMain" class="price-main">--</div>
    <div id="priceChange" class="price-change">--</div>
    <div class="header-stats">
      <div class="header-stat"><span class="lbl">24H 最高</span><span class="val" id="h24">--</span></div>
      <div class="header-stat"><span class="lbl">24H 最低</span><span class="val" id="l24">--</span></div>
      <div class="header-stat"><span class="lbl">24H 成交额</span><span class="val" id="vol24">--</span></div>
      <div class="header-stat" id="dFundingStatBox" style="display:none">
        <span class="lbl">资金费率</span>
        <span class="val" id="dFundingRate">--</span>
      </div>
      <div class="header-stat" id="dOIStatBox" style="display:none">
        <span class="lbl">持仓价值</span>
        <span class="val" id="dOpenInterestUsdt">--</span>
      </div>
    </div>
    <div class="header-right">
      <div id="sessionClock"></div>
<div><span class="update-time" id="lastUpdateTime">等待初次加载...</span></div>
      <div class="countdown-box">
        <div class="countdown-label">下次更新</div>
        <div class="countdown-val" id="countdown">--:--</div>
      </div>
      <div class="updating-dot" id="updatingDot" title="正在更新数据..."></div>
    </div>
  </div>

  <!-- 多周期汇总条 -->
  <div class="desktop-summary-bar">
    <span class="summary-label">多周期信号</span>
    <div id="summaryChips"></div>
    <div id="quickStats"></div>
  </div>

  <!-- 主区域 -->
  <div class="desktop-main">
    <!-- 左侧指标面板 -->
    <div class="sidebar" id="sidebar">
      <div class="loading" id="sidebarLoading">
        <div class="spinner"></div>
        <div>正在加载分析数据...</div>
      </div>
    </div>

    <!-- 右侧图表 -->
    <div class="chart-area">
      <div class="chart-toolbar">
        <span>技术图表 —</span>
        <span id="chartTfLabel" style="color:#90caf9;font-weight:600">--</span>
        <span id="chartStatus" style="margin-left:12px;font-size:11px;color:var(--text3)"></span>
        <span id="volSpikeTag" style="display:none;margin-left:6px;font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px"></span>
        <div style="margin-left:auto;display:flex;align-items:center;gap:4px" id="overlayBtns">
          <button class="overlay-btn" data-key="sr"   onclick="toggleOverlay('sr')"   title="支撑/阻力线">S/R</button>
          <button class="overlay-btn" data-key="fvg"  onclick="toggleOverlay('fvg')"  title="公允价值缺口">FVG</button>
          <button class="overlay-btn" data-key="vp"   onclick="toggleOverlay('vp')"   title="成交量分布">VP</button>
          <button class="overlay-btn" data-key="plan" onclick="toggleOverlay('plan')" title="交易计划线">计划</button>
          <button class="overlay-btn" data-key="ms"   onclick="toggleOverlay('ms')"   title="市场结构 BOS/CHoCH">MS</button>
        </div>
      </div>
      <div id="chart-desktop" style="flex:1;position:relative">
        <div id="chartLoading" class="chart-loading-overlay">
          <div class="spinner"></div>
          <div>正在加载图表数据...</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /desktop-only -->


<!-- ══════════════════════════════════════════════════════
     手机端布局（PWA App 风格）
══════════════════════════════════════ -->
<div class="mobile-only" id="mobileApp" style="flex-direction:column;height:100%;overflow:hidden;">

  <!-- App 顶部 Header -->
  <div class="app-header mobile-only">
    <div class="app-header-row1">
      <select id="mSymbolSelect" class="app-symbol-select"></select>
      <div id="mPriceMain" class="app-price-big">--</div>
      <div id="mPriceChange" class="app-price-chg price-change">--</div>
    </div>

/* ══════════════════════════════════════════════════════

const TF_LABELS_FULL = {'15m':'15分钟','30m':'30分钟','1h':'1小时','2h':'2小时','4h':'4小时','8h':'8小时','1d':'日线','1w':'周线'};

let currentSymbol = 'BTCUSDT';
let analysisData  = {};
let isMobile      = window.innerWidth < 768;
let mobileTab     = 'chart';   // 当前手机 tab

let obPressureCache = {};      // { symbol: ob_pressure snapshot }

let _prevAboveVwap = null;     // VWAP 穿越方向追踪（null=未初始化）
let onchainData   = {};        // CoinMetrics 真链上数据（30分钟缓存）
let _fng          = null;      // { value, label, col } 恐慌/贪婪指数缓存
let _whaleTrades  = [];        // 大单流水缓存
let _lastAnalysisTs = 0;       // 最近一次分析渲染时间戳
let _lastKlines = null;        // {candles, supports, resistances, fib, tf} 最近K线缓存供叠加层重绘
let _chartOverlays = (() => {

/* ══════════════════════════════════════════════════════
   工具函数
══════════════════════════════════════════════════════ */
const fmt   = n => n == null ? '--' : '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN  = n => n == null ? '--' : Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const sc    = s => s > 0 ? 'bull' : (s < 0 ? 'bear' : 'neutral');
const noNaN = arr => arr.map(v => (v == null || isNaN(v)) ? null : v);

// S/R 来源徽章：📋 挂单墙 | 📊 成交量节点 | 🔴/🟢 清算区 | 空=纯分形
function srBadge(source) {
  if (!source) return '';
  const parts = source.split('+');
  const hasOB       = parts.some(p => p.startsWith('orderbook'));
  const hasVol      = parts.includes('volume');
  const hasLiqLong  = parts.includes('liq_long');
  const hasLiqShort = parts.includes('liq_short');
  const hasVpPoc    = parts.includes('vp_poc');
  const hasVpVA     = parts.includes('vp_vah') || parts.includes('vp_val');
  const hasVpHvn    = parts.includes('vp_hvn');
  const hasFvgBull  = parts.includes('fvg_bull');
  const hasFvgBear  = parts.includes('fvg_bear');
  let badges = [];
  if (hasOB)       badges.push('<span class="sr-badge">📋 挂单墙</span>');
  if (hasVol)      badges.push('<span class="sr-badge">📊</span>');
  if (hasLiqLong)  badges.push('<span class="sr-badge" style="background:rgba(239,83,80,0.18);color:#ef5350">🔴 多头清算</span>');
  if (hasLiqShort) badges.push('<span class="sr-badge" style="background:rgba(38,166,154,0.18);color:#26a69a">🟢 空头清算</span>');
  if (hasVpPoc)    badges.push('<span class="sr-badge" style="background:rgba(255,152,0,0.18);color:#ff9800">🎯 POC</span>');
  if (hasVpVA)     badges.push('<span class="sr-badge" style="background:rgba(255,152,0,0.12);color:#ffb74d">📦 VA</span>');
  if (hasVpHvn)    badges.push('<span class="sr-badge" style="background:rgba(255,152,0,0.10);color:#ffe082">HVN</span>');
  if (hasFvgBull)  badges.push('<span class="sr-badge" style="background:rgba(38,166,154,0.18);color:#4db6ac">🔲↑ FVG</span>');
  if (hasFvgBear)  badges.push('<span class="sr-badge" style="background:rgba(239,83,80,0.18);color:#ef9a9a">🔲↓ FVG</span>');
  return badges.join('');
}

function setEls(ids, val) { ids.forEach(([id, v]) => { const el = document.getElementById(id); if(el) el.textContent = v || val; }); }

/* ══════════════════════════════════════════════════════

if ('serviceWorker' in navigator) {

/* ══════════════════════════════════════════════════════
   初始化下拉框（桌面 + 手机双份）

function initSymbolSelects() {
  ['symbolSelect','mSymbolSelect'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    SYMBOLS.forEach(s => {

    sel.onchange = e => {
      currentSymbol = e.target.value;
      // 同步另一个下拉框
      ['symbolSelect','mSymbolSelect'].forEach(oid => {
        const o = document.getElementById(oid);
        if (o && o !== sel) o.value = currentSymbol;
      });
      resetData(); fetchPrice(); fetchFunding(); fetchAnalysisAndUpdate();
    };
  });
}

function resetData() {

  setEls([
    ['priceMain','--'],['mPriceMain','--'],

/* ══════════════════════════════════════════════════════

/* ══════════════════════════════════════════════════════
   实时价格（每10秒）
══════════════════════════════════════════════════════ */
async function fetchPrice() {
  try {
    const r = await fetch(`/api/price?symbol=${currentSymbol}`);
    if (!r.ok) return;
    const d = await r.json();
    if (d.symbol !== currentSymbol) return;
    const p = fmt(d.price);
    const chg = d.change_pct;
    const chgTxt = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
    const chgCls = 'price-change ' + (chg >= 0 ? 'up' : 'down');
    const vol = d.volume24h;
    const volTxt = vol >= 1e9 ? (vol/1e9).toFixed(2)+'B' : (vol/1e6).toFixed(0)+'M';

    // 桌面
    setEls([['priceMain',p],['h24',fmt(d.high24h)],['l24',fmt(d.low24h)],['vol24',volTxt]], '--');
    const pc = document.getElementById('priceChange');
    if (pc) { pc.textContent = chgTxt; pc.className = chgCls; }

    // 手机
    setEls([['mPriceMain',p],['mH24',fmt(d.high24h)],['mL24',fmt(d.low24h)],['mVol24',volTxt]], '--');
    const mpc = document.getElementById('mPriceChange');
    if (mpc) { mpc.textContent = chgTxt; mpc.className = 'app-price-chg ' + (chg >= 0 ? 'up' : 'down'); }
    checkPriceAlerts(d.price);
  } catch(e) { console.warn('price fetch failed', e); }
}

/* ══════════════════════════════════════════════════════
   关键位接近提醒
══════════════════════════════════════════════════════ */
function showToast(msg, type = 'warn') {
  const c = document.getElementById('toast-container');
  if (!c) return;
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  c.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 4000);
}

function checkPriceAlerts(price) {
  if (!price || !analysisData._ready) return;
  const data = analysisData[currentTf];
  if (!data) return;
  const now = Date.now();
  const COOLDOWN = 5 * 60 * 1000; // 5分钟冷却

  // 检查支撑/阻力位
  const levels = [
    ...(data.supports || []).map(s => ({ ...s, side: 'sup' })),
    ...(data.resistances || []).map(r => ({ ...r, side: 'res' })),
  ];
  for (const lv of levels) {
    if (!lv.price) continue;
    const dist = Math.abs(price - lv.price) / price * 100;
    if (dist > 0.5) continue;
    const key = `sr_${Math.round(lv.price / 100) * 100}_${lv.side}`;
    if (now - (_alertTS[key] || 0) < COOLDOWN) continue;
    _alertTS[key] = now;
    const dir = lv.side === 'sup' ? '支撑' : '阻力';
    const type = lv.side === 'sup' ? 'bull' : 'bear';
    showToast(`⚠ 接近${dir}位 $${Math.round(lv.price).toLocaleString()} (±${dist.toFixed(2)}%)`, type);
  }

  // 检查清算密集区
  const rd = data.rd;
  const clusters = rd?.liq?.clusters || [];
  for (const lc of clusters) {
    if (!lc.price) continue;
    const dist = Math.abs(price - lc.price) / price * 100;
    if (dist > 1.0) continue;
    const key = `liq_${Math.round(lc.price / 200) * 200}`;
    if (now - (_alertTS[key] || 0) < COOLDOWN) continue;
    _alertTS[key] = now;
    const isBull = (lc.dominant || '').includes('多头');
    showToast(`💥 接近清算密集区 $${Math.round(lc.price).toLocaleString()} (${dist.toFixed(2)}%)`, isBull ? 'bear' : 'bull');
  }

  // 检查入场触发价 & 失效线
  const tp = rd?.trade_plan;
  if (tp?.entry_price && ['long', 'short'].includes(tp.direction)) {
    const entryDist = Math.abs(price - tp.entry_price) / price * 100;
    if (entryDist <= 0.15) {
      const eKey = `entry_${Math.round(tp.entry_price / 10) * 10}`;
      if (now - (_alertTS[eKey] || 0) >= COOLDOWN) {
        _alertTS[eKey] = now;
        const dir = tp.direction === 'long' ? '做多' : '做空';
        showToast(`🎯 入场区间！${dir}触发 $${Math.round(tp.entry_price).toLocaleString()} (距${entryDist.toFixed(2)}%)`, tp.direction === 'long' ? 'bull' : 'bear');
      }
    }
    const inv = tp.invalidation;
    if (inv?.price) {
      const broken = tp.direction === 'long' ? price <= inv.price : price >= inv.price;
      if (broken) {
        const iKey = `inv_${Math.round(inv.price / 10) * 10}`;
        if (now - (_alertTS[iKey] || 0) >= COOLDOWN * 2) {
          _alertTS[iKey] = now;
          showToast(`⚡ 信号失效！$${Math.round(inv.price).toLocaleString()} 已破，做${tp.direction === 'long' ? '多' : '空'}结构瓦解`, 'bear');
        }
      }
    }

    // TP1 触达 → 建议移止损至成本
    const tp1 = tp?.tp_levels?.[0];
    if (tp1?.price && tp.entry_price) {
      const tp1Hit = tp.direction === 'long' ? price >= tp1.price : price <= tp1.price;
      if (tp1Hit) {
        const t1Key = `tp1_${Math.round(tp1.price / 10) * 10}`;
        if (now - (_alertTS[t1Key] || 0) >= COOLDOWN * 6) {
          _alertTS[t1Key] = now;
          showToast(`🎯 TP1 触达 $${Math.round(tp1.price).toLocaleString()} · 建议移止损至成本 $${Math.round(tp.entry_price).toLocaleString()}`, 'bull');
        }
      }
    }
  }

  // VWAP 穿越警报
  const vwap = rd?.vwap?.val;
  if (vwap && price) {
    const aboveNow = price > vwap;
    if (_prevAboveVwap !== null && _prevAboveVwap !== aboveNow) {
      const vKey = `vwap_cross_${aboveNow ? 'up' : 'dn'}`;
      if (now - (_alertTS[vKey] || 0) >= COOLDOWN) {
        _alertTS[vKey] = now;
        showToast(aboveNow
          ? `🌊 价格重夺 VWAP $${Math.round(vwap).toLocaleString()} · 多头占优`
          : `🌊 价格跌破 VWAP $${Math.round(vwap).toLocaleString()} · 空头占优`,
          aboveNow ? 'bull' : 'bear');
      }
    }
    _prevAboveVwap = aboveNow;
  }

  // 资金费率急变警报
  const fundD = fundingCache[currentSymbol];
  if (fundD?.historical?.length >= 20) {
    const rates  = fundD.historical.map(h => h.rate || 0);
    const prev10 = rates.slice(-20, -10).reduce((a, b) => a + b, 0) / 10;
    const last10 = rates.slice(-10).reduce((a, b) => a + b, 0) / 10;
    const frSpike = last10 - prev10;
    if (Math.abs(frSpike) >= 0.03) {
      const frKey = `fr_spike_${frSpike > 0 ? 'up' : 'dn'}`;
      if (now - (_alertTS[frKey] || 0) >= COOLDOWN * 4) {
        _alertTS[frKey] = now;
        showToast(frSpike > 0
          ? `⚡ 资金费率急升 +${frSpike.toFixed(3)}% · 多头过热，注意回调`
          : `⚡ 资金费率急降 ${frSpike.toFixed(3)}% · 空头压力加剧`,
          frSpike > 0 ? 'bear' : 'bull');
      }
    }
  }
}

/* ══════════════════════════════════════════════════════
   资金费率 + 持仓量（每30秒刷新）
══════════════════════════════════════════════════════ */
async function fetchFunding() {
  try {
    const r = await fetch(`/api/funding?symbol=${currentSymbol}`);
    if (!r.ok) return;
    const d = await r.json();
    if (d.error) return;

    // 存入全局缓存（供 buildAnalysisHTML 使用）
    fundingCache[currentSymbol] = d;

    // 资金费率颜色：正=橙(多头偏多)，负=绿(空头偏多)，中性=灰
    const fr = d.funding_rate;
    const fa = d.analysis;
    const frTxt   = fr != null ? (fr >= 0 ? '+' : '') + fr.toFixed(4) + '%' : '--';
    const frColor = fa ? fa.color : (fr == null ? '' : fr > 0 ? 'var(--bull)' : fr < 0 ? 'var(--bear)' : 'var(--text)');

    // 持仓价值格式化
    const oi = d.open_interest_usdt;
    let oiTxt = '--';
    if (oi != null) {
      oiTxt = oi >= 1e9 ? (oi/1e9).toFixed(2)+'B' : oi >= 1e6 ? (oi/1e6).toFixed(0)+'M' : oi.toFixed(0);
    }

    // 更新桌面 header
    const dfb = document.getElementById('dFundingStatBox');
    const dob = document.getElementById('dOIStatBox');
    const dfr = document.getElementById('dFundingRate');
    const doi = document.getElementById('dOpenInterestUsdt');
    if (dfb && fr != null) { dfb.style.display=''; dfr.textContent=frTxt; dfr.style.color=frColor; }
    if (dob && oi != null) { dob.style.display=''; doi.textContent=oiTxt; }

    // 更新手机 header
    const mfb = document.getElementById('mFundingStatBox');
    const mfr = document.getElementById('mFundingRate');
    if (mfb && fr != null) { mfb.style.display=''; mfr.textContent=frTxt; mfr.style.color=frColor; }

/* ══════════════════════════════════════════════════════
   交易时段时钟
══════════════════════════════════════════════════════ */
function updateSessionClock() {
  const el = document.getElementById('sessionClock');
  if (!el) return;
  const now  = new Date();
  const frac = now.getUTCHours() + now.getUTCMinutes() / 60;
  // 各时段 UTC 区间
  const SESSIONS = [
    { name:'亚盘', start:0,  end:9,  color:'#f9a825', vol:'低波动' },
    { name:'伦敦', start:7,  end:16, color:'#29b6f6', vol:'中高波动' },
    { name:'美盘', start:13, end:22, color:'#66bb6a', vol:'最高波动' },
  ];
  const active = SESSIONS.filter(s => frac >= s.start && frac < s.end);
  if (active.length === 0) {
    el.innerHTML = `<span class="sess-tag" style="background:#1a1f2e;color:#546e7a">深夜盘</span>`;
    return;
  }
  const overlap = active.length > 1;
  let html = overlap ? `<span class="sess-overlap">⚡交叉</span>` : '';
  html += active.map(s => {
    const remMin = Math.round((s.end - frac) * 60);
    const rH = Math.floor(remMin / 60), rM = remMin % 60;
    return `<span class="sess-tag" style="background:${s.color}20;color:${s.color}">${s.name} <span style="opacity:.65">${rH}h${String(rM).padStart(2,'0')}m</span></span>`;
  }).join('');
  el.innerHTML = html;
}

/* ══════════════════════════════════════════════════════
   倒计时
══════════════════════════════════════════════════════ */
let _remaining = 300, _countdownTimer = null;
function startCountdown(secs) {
  _remaining = secs;
  if (_countdownTimer) clearInterval(_countdownTimer);
  _countdownTimer = setInterval(() => {
    _remaining = Math.max(0, _remaining - 1);
    const m = String(Math.floor(_remaining / 60)).padStart(2,'0');
    const s = String(_remaining % 60).padStart(2,'0');
    const txt = m + ':' + s;
    setEls([['countdown',txt],['mCountdown',txt]], '--');
  }, 1000);
}

let _lastUpdate   = null;
let lastUpdateId  = 0;   // 追踪 update_id，检测新一轮全量刷新完成

async function pollStatus() {
  try {
    const r = await fetch(`/api/status?symbol=${currentSymbol}`);
    const d = await r.json();
    if (d.symbol !== currentSymbol) return;
    document.getElementById('updatingDot')?.classList.toggle('active', d.updating);
    document.getElementById('mUpdatingDot')?.classList.toggle('active', d.updating);
    startCountdown(d.seconds_remaining);

    // 检测 update_id 变化（非首次加载时显示 toast）
    const newId = d.update_id || 0;
    if (newId > 0 && newId !== lastUpdateId && lastUpdateId !== 0) {
      showToast('数据已更新 ✓');
    }
    if (newId > 0) lastUpdateId = newId;

    if ((d.last_update && d.last_update !== _lastUpdate) || (d.ready && !analysisData._ready)) {
      _lastUpdate = d.last_update;
      if (d.last_update) {
        const el = document.getElementById('lastUpdateTime');
        if (el) el.textContent = '更新于 ' + d.last_update;
      }
      await fetchAnalysisAndUpdate();
    }
  } catch(e) { console.warn('status poll failed', e); }
}

function showToast(msg, duration = 2500) {
  let t = document.getElementById('update-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'update-toast';
    t.style.cssText = [
      'position:fixed', 'bottom:20px', 'right:20px', 'z-index:9999',
      'background:#26a69a', 'color:#fff', 'padding:7px 14px',
      'border-radius:6px', 'font-size:12px', 'opacity:0',
      'transition:opacity .3s', 'pointer-events:none'
    ].join(';');
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, duration);
}

/* ══════════════════════════════════════════════════════
   仓位计算器
══════════════════════════════════════════════════════ */
function openPosCalc(entryPrice, slPrice) {
  const panel = document.getElementById('posCalcPanel');
  if (!panel) return;
  // 预填账户余额和风险比例（从 localStorage 恢复）
  const balEl  = document.getElementById('calBalance');
  const riskEl = document.getElementById('calRisk');
  if (balEl  && !balEl.value)  balEl.value  = localStorage.getItem('calBal')  || '10000';
  if (riskEl && !riskEl.value) riskEl.value = localStorage.getItem('calRisk') || '1';
  // 预填入场/止损价
  if (entryPrice) document.getElementById('calEntry').value = Number(entryPrice).toFixed(2);
  if (slPrice)    document.getElementById('calSL').value    = Number(slPrice).toFixed(2);
  panel.classList.add('open');
  calcPosition();
}
function closePosCalc() {
  document.getElementById('posCalcPanel')?.classList.remove('open');
}
function calcPosition() {
  const bal   = parseFloat(document.getElementById('calBalance')?.value) || 0;
  const risk  = parseFloat(document.getElementById('calRisk')?.value)    || 1;
  const entry = parseFloat(document.getElementById('calEntry')?.value)   || 0;
  const sl    = parseFloat(document.getElementById('calSL')?.value)      || 0;
  // 持久化设置
  if (bal  > 0) localStorage.setItem('calBal',  bal);
  if (risk > 0) localStorage.setItem('calRisk', risk);
  const res = document.getElementById('calcResult');
  if (!res) return;
  if (!bal || !entry || !sl || entry === sl) {
    res.innerHTML = '<div style="font-size:11px;color:var(--text3);text-align:center">请填写账户余额和入场/止损价格</div>';
    return;
  }
  const riskAmt   = bal * risk / 100;                       // 风险金额
  const slDistPct = Math.abs(entry - sl) / entry * 100;     // 止损幅度%
  const posSize   = riskAmt / (slDistPct / 100);            // 仓位价值(USDT)
  const qty       = posSize / entry;                        // 数量(BTC)
  const leverage  = posSize / bal;                          // 隐含杠杆
  const isLong    = entry > sl;
  const rr1       = analysisData[currentTf]?.rd?.trade_plan?.rr_tp1;
  const profitEst = rr1 ? riskAmt * rr1 : null;
  const leverageStr = leverage < 1.5 ? '1×' : leverage < 2.5 ? '2×' : leverage < 3.5 ? '3×'
    : leverage < 6 ? '5×' : leverage < 8 ? '7×' : '10×+';
  const lvCol = leverage <= 3 ? '#26a69a' : leverage <= 7 ? '#f9a825' : '#ef5350';

  res.innerHTML = `
    <div class="calc-result-row">
      <span style="color:var(--text3)">方向</span>
      <span style="color:${isLong?'#26a69a':'#ef5350'};font-weight:700">${isLong?'做多 ↑':'做空 ↓'}</span>
    </div>
    <div class="calc-result-row">
      <span style="color:var(--text3)">风险金额</span>
      <span style="color:#f9a825;font-weight:700">$${riskAmt.toFixed(2)} (${risk}%)</span>
    </div>
    <div class="calc-result-row">
      <span style="color:var(--text3)">止损幅度</span>
      <span>${slDistPct.toFixed(2)}%</span>
    </div>
    <div class="calc-result-row">
      <span style="color:var(--text3)">建议仓位</span>
      <span style="font-size:14px;font-weight:800;color:var(--accent)">$${posSize.toLocaleString('en-US',{maximumFractionDigits:0})}</span>
    </div>
    <div class="calc-result-row">
      <span style="color:var(--text3)">数量 (BTC)</span>
      <span style="font-weight:600">${qty.toFixed(4)} BTC</span>
    </div>
    <div class="calc-result-row">
      <span style="color:var(--text3)">隐含杠杆</span>
      <span style="color:${lvCol};font-weight:700">${leverageStr} (${leverage.toFixed(1)}×)</span>
    </div>
    ${profitEst ? `<div class="calc-result-row">
      <span style="color:var(--text3)">预估盈利 (TP1)</span>
      <span style="color:#26a69a;font-weight:700">+$${profitEst.toFixed(2)}</span>
    </div>` : ''}
  `;
}
