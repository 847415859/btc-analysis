/* ══════════════════════════════════════════════════════
   Volume Profile 卡片（POC / VAH / VAL / HVN）
══════════════════════════════════════════════════════ */
function buildVolumeProfileCard(rd) {
  const vp = rd?.volume_profile || analysisData[currentTf]?.volume_profile;
  if (!vp || !vp.poc) return '';
  const price  = rd?.price || 0;
  const pocAbove = vp.poc_above;
  const pocColor = pocAbove ? 'var(--bear)' : 'var(--bull)';  // POC 上方=阻力；下方=支撑

  // Mini horizontal bar chart（前5大 HVN）
  const bins = vp.chart_bins || [];
  let barHtml = '';
  if (bins.length > 0) {
    const maxBar = Math.max(...bins.map(b => b.bar_pct));
    barHtml = bins.slice(0, 10).map(b => {
      const isPoc  = Math.abs(b.price - vp.poc) / (vp.poc||1) < 0.001;
      const isVAH  = Math.abs(b.price - vp.vah) / (vp.vah||1) < 0.001;
      const isVAL  = Math.abs(b.price - vp.val) / (vp.val||1) < 0.001;
      const col    = isPoc ? '#ff9800' : isVAH||isVAL ? '#ffb74d' : '#455a64';
      const wPct   = (b.bar_pct / (maxBar||1) * 70).toFixed(1);
      return `<div style="display:flex;align-items:center;gap:4px;margin:1px 0">
        <span style="width:56px;font-size:9px;color:var(--text3);text-align:right">
          $${Math.round(b.price).toLocaleString()}</span>
        <div style="flex:1;background:#1a2035;border-radius:1px;height:5px">
          <div style="width:${wPct}%;height:100%;background:${col};border-radius:1px"></div>
        </div>
        <span style="width:30px;font-size:9px;color:var(--text3)">${b.vol_pct.toFixed(1)}%</span>
        ${isPoc ? '<span style="font-size:8px;color:#ff9800">POC</span>' : ''}
      </div>`;
    }).join('');
  }

  const hvnRows = (vp.hvn || []).slice(0,4).map(h =>
    `<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2)">
      <span>$${Math.round(h.price).toLocaleString()}</span>
      <span style="color:var(--text3)">${h.vol_pct}%</span>
    </div>`
  ).join('');

  return `<div class="card">
    <div class="card-title">📊 Volume Profile
      <span style="font-size:10px;color:#546e7a;font-weight:400;margin-left:6px">POC · VAH · VAL · HVN</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">
      <div style="text-align:center;padding:6px;background:rgba(255,152,0,0.08);border-radius:5px">
        <div style="font-size:9px;color:#ff9800;margin-bottom:2px">🎯 POC</div>
        <div style="font-size:12px;font-weight:700;color:#ff9800">${fmt(vp.poc)}</div>
        <div style="font-size:9px;color:var(--text3)">${pocAbove?'↑ 价格下方':'↓ 价格上方'}</div>
      </div>
      <div style="text-align:center;padding:6px;background:rgba(255,183,77,0.06);border-radius:5px">
        <div style="font-size:9px;color:#ffb74d;margin-bottom:2px">VAH</div>
        <div style="font-size:12px;font-weight:600;color:#ffb74d">${fmt(vp.vah)}</div>
      </div>
      <div style="text-align:center;padding:6px;background:rgba(255,183,77,0.06);border-radius:5px">
        <div style="font-size:9px;color:#ffb74d;margin-bottom:2px">VAL</div>
        <div style="font-size:12px;font-weight:600;color:#ffb74d">${fmt(vp.val)}</div>
      </div>
    </div>
    <div style="font-size:10px;color:var(--text3);margin-bottom:6px">
      价值区宽度 ${vp.va_width_pct?.toFixed(1)||0}% · ${vp.dist_type||''}
    </div>
    ${barHtml ? `<div style="margin-bottom:8px">${barHtml}</div>` : ''}
    ${hvnRows ? `<div style="font-size:10px;color:var(--text3);margin-bottom:4px;margin-top:6px">⚡ HVN 高成交量节点</div>${hvnRows}` : ''}
  </div>`;
}

/* ══════════════════════════════════════════════════════
   Fair Value Gap 卡片
══════════════════════════════════════════════════════ */
function buildFVGCard(rd) {
  const fvgs = rd?.fvg_zones || analysisData[currentTf]?.fvg_zones;
  if (!fvgs || fvgs.length === 0) return '';
  const price = rd?.price || 0;

  const rows = fvgs.slice(0, 6).map(fvg => {
    const isBull   = fvg.type === 'bullish_fvg';
    const col      = isBull ? 'var(--bull)' : 'var(--bear)';
    const icon     = isBull ? '🔲↑' : '🔲↓';
    const dir      = isBull ? '支撑' : '阻力';
    const distPct  = price ? ((fvg.mid - price) / price * 100).toFixed(2) : '--';
    const distSign = fvg.mid > price ? '+' : '';
    const fillBarW = fvg.filled_pct.toFixed(0);
    return `<div style="padding:6px 0;border-bottom:1px solid var(--border2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <span style="color:${col};font-size:11px;font-weight:600">${icon} ${dir} · ${fmt(fvg.mid)}</span>
        <span style="color:var(--text3);font-size:10px">${distSign}${distPct}%</span>
      </div>
      <div style="font-size:10px;color:var(--text2);margin-bottom:3px">
        ${fmt(fvg.bottom)} – ${fmt(fvg.top)} &nbsp;
        <span style="color:var(--text3)">${fvg.size_pct?.toFixed(2)||0}% · ${fvg.age_bars}根前</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="font-size:9px;color:var(--text3);width:44px">填充</span>
        <div style="flex:1;background:#1a2035;border-radius:2px;height:4px">
          <div style="width:${fillBarW}%;height:100%;background:${col};border-radius:2px;opacity:0.7"></div>
        </div>
        <span style="font-size:9px;color:var(--text3);width:28px">${fillBarW}%</span>
      </div>
    </div>`;
  }).join('');

  const fvgScore = rd?.fvg_score || 0;
  const scColor  = fvgScore > 0 ? 'var(--bull)' : fvgScore < 0 ? 'var(--bear)' : 'var(--text3)';

  return `<div class="card">
    <div class="card-title">🔲 Fair Value Gap
      <span style="font-size:10px;color:#546e7a;font-weight:400;margin-left:6px">价格失衡区 · 机构回填磁吸</span>
      ${fvgScore !== 0 ? `<span style="margin-left:auto;font-size:11px;color:${scColor};font-weight:700">${fvgScore>0?'+':''}${fvgScore}</span>` : ''}
    </div>
    <div style="font-size:11px;color:#546e7a;line-height:1.6;margin-bottom:8px">
      三根K线价格跳空（FVG）是机构未成交订单区，回填概率 &gt;60%。<br>
      FVG↑ = 看涨失衡，回调时支撑；FVG↓ = 看跌失衡，反弹时阻力。
    </div>
    ${rows}
  </div>`;
}

/* ══════════════════════════════════════════════════════
   交易决策摘要横幅 — 最顶层的一句话判断
══════════════════════════════════════════════════════ */
function buildDecisionBanner(rd) {
  const tp = rd?.trade_plan;
  if (!tp) return '';
  const fmt = p => p == null ? '--' : '$' + Math.round(p).toLocaleString('en-US');
  const TF_VALIDITY = {
    '15m':'约30-60分钟','30m':'约1-2小时','1h':'约2-4小时',
    '2h':'约4-8小时','4h':'约8-16小时','8h':'约1-2天',
    '1d':'约2-4天','1w':'约1-2周'
  };
  const validity = TF_VALIDITY[currentTf] || '';
  const isWait = tp.direction === 'wait';
  const isLong = tp.direction === 'long';
  const isSpec = tp.is_speculative === true;

  // ── compositeScore 快速近似（复用 rd 已有字段，无需重算）──
  const _frScoreApprox = (() => {
    const fc = fundingCache[currentSymbol];
    if (!fc?.analysis) return 0;
    return fc.analysis.score || 0;
  })();
  const _oiApprox = (() => {
    const fc = fundingCache[currentSymbol];
    if (!fc?.oi?.history?.length) return 0;
    const sig = getOIBreakoutSignal(fc, rd);
    return sig?.score || 0;
  })();
  const compositeApprox = rd.score + _frScoreApprox + _oiApprox;

  // compositeScore → 决断一句话
  const _verdicts = [
    [8,  true,  '强烈看多 🚀', '可积极做多，止损严守，目标看前高'],
    [4,  true,  '偏多 📈',     '逢低限价建仓，支撑附近分批入场'],
    [1,  true,  '温和偏多',    '轻仓试探，等突破确认再加仓'],
    [-1, true,  '中性震荡 ↔️', '暂无方向优势，等待关键位突破'],
    [-4, false, '温和偏空',    '谨慎追多，反弹视做空机会'],
    [-8, false, '偏空 📉',     '逢高限价做空，阻力附近分批建仓'],
    [-99,false, '强烈看空 🔻', '可积极做空，止损严守，目标看前低'],
  ];
  let verdictLabel = '', verdictSuggest = '';
  for (const [thresh, bull, label, sug] of _verdicts) {
    if (compositeApprox >= thresh) { verdictLabel = label; verdictSuggest = sug; break; }
  }
  if (!verdictLabel) { verdictLabel = '强烈看空 🔻'; verdictSuggest = '可积极做空，止损严守，目标看前低'; }

  // ── Top-3 信号催化剂（从 rd 快速提取）─────────────────
  const catalysts = [];
  const ms = rd?.market_structure;
  if (ms?.structure_cn && ms.structure !== 'unknown')
    catalysts.push(ms.structure_cn.replace(/[()（）↑↓]/g,'').trim());
  const divSigs = rd?.divergence?.signals || [];
  if (divSigs.length) catalysts.push(divSigs[0].replace(/^[⚠️✅🔻📈\s]+/,'').split('：')[0].substring(0,12));
  const patterns = rd?.candle_patterns?.patterns || [];
  if (patterns.length) catalysts.push(patterns[0].name);
  if (rd?.vwap) catalysts.push(rd.vwap.above ? 'VWAP 多方占优' : 'VWAP 空方占优');
  const mtfNote = rd?.mtf_bias?.note || '';
  if (mtfNote) catalysts.push(mtfNote.replace(/^[✅⚠️🔻📈\s]+/,'').split('，')[0].substring(0,14));
  if (rd?.regime?.note) catalysts.push(rd.regime.note.split('，')[0].substring(0,12));
  const top3 = catalysts.filter(Boolean).slice(0, 3);

  // ── 颜色主题 ──────────────────────────────────────────
  const theme = isWait ? { bg:'rgba(120,144,156,0.10)', border:'#546e7a', accent:'#90a4ae', icon:'⏸' }
    : isSpec ? { bg: isLong ? 'rgba(249,168,37,0.10)' : 'rgba(255,112,67,0.10)',
                  border: isLong ? '#f9a825' : '#ff7043', accent: isLong ? '#f9a825' : '#ff7043', icon:'🎲' }
    : isLong  ? { bg:'rgba(38,166,154,0.15)', border:'#26a69a', accent:'#26a69a', icon:'📈' }
              : { bg:'rgba(239,83,80,0.15)',   border:'#ef5350', accent:'#ef5350', icon:'📉' };

  // ── Grade 徽章 ────────────────────────────────────────
  const grade = window._currentGrade || ['–','#78909c',''];
  const gradeText = isSpec ? 'C' : grade[0];
  const gradeCol  = isSpec ? '#f9a825' : grade[1];

  // ── 紧迫度徽章（Fix B）────────────────────────────────
  const entryDist   = Math.abs(tp?.entry_dist_pct || 0);
  const entryMethod = tp?.entry_method || '';
  let urgencyHtml = '';
  if (!isWait) {
    if (entryMethod === '市价追入') {
      urgencyHtml = `<span class="urgency-badge urgent">🔴 立即入场</span>`;
    } else if (entryDist < 0.5) {
      urgencyHtml = `<span class="urgency-badge near">⚡ 已近入场区</span>`;
    } else if (entryMethod.includes('预挂')) {
      urgencyHtml = `<span class="urgency-badge pending">📌 可预挂单</span>`;
    } else if (entryMethod.includes('限价')) {
      urgencyHtml = `<span class="urgency-badge limit">🎯 限价等触发</span>`;
    }
  }

  // ── 第一行：方向 + 决断语 ─────────────────────────────
  let mainLine, subLine;
  if (isWait) {
    mainLine = `<span style="font-size:15px;font-weight:800;color:${theme.accent}">⏸ 等待机会</span>`;
    subLine  = `<span style="font-size:11px;color:#78909c">${tp.condition_long || tp.reason || ''}</span>`;
  } else if (isSpec) {
    mainLine = `<span style="font-size:15px;font-weight:800;color:${theme.accent}">${theme.icon} ${isLong ? '投机做多' : '投机做空'}</span>
      <span style="font-size:12px;color:${gradeCol};background:${gradeCol}22;padding:1px 6px;border-radius:4px;border:1px solid ${gradeCol}44">Grade ${gradeText}</span>
      <span style="font-size:11px;color:${theme.accent}">· ${verdictLabel}</span>
      ${urgencyHtml}`;
    subLine  = `<span style="font-size:10px;color:var(--text3)">轻仓 ≤ 0.5% 风险 · ${validity}</span>`;
  } else {
    mainLine = `<span style="font-size:16px;font-weight:900;color:${theme.accent}">${theme.icon} ${isLong ? '做多' : '做空'}</span>
      <span style="font-size:13px;font-weight:800;color:${gradeCol};background:${gradeCol}22;padding:1px 7px;border-radius:4px;border:1px solid ${gradeCol}44">Grade ${gradeText}</span>
      <span style="font-size:12px;color:${theme.accent};font-weight:700">· ${verdictLabel}</span>
      ${urgencyHtml}`;
    subLine  = `<span style="font-size:11px;color:var(--text3)">${verdictSuggest}</span>`;
  }

  // ── 催化剂标签行 ────────────────────────────────────────
  const catalystRow = top3.length ? `
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px">
      <span style="font-size:10px;color:var(--text3)">📌</span>
      ${top3.map(c => `<span style="font-size:10px;color:${theme.accent};background:${theme.accent}15;
        padding:1px 6px;border-radius:10px;border:1px solid ${theme.accent}30">${c}</span>`).join('')}
      <span style="margin-left:auto;font-size:10px;color:var(--text3)">信号有效 ${validity}</span>
    </div>` : '';

  // ── 关键价位行 ─────────────────────────────────────────
  const priceRow = (!isWait && tp.entry_price) ? (() => {
    const tp1 = tp.tp_levels?.[0];
    const rrCol = tp.rr_tp1 >= 2.0 ? '#26a69a' : tp.rr_tp1 >= 1.5 ? '#f9a825' : '#ef9a9a';
    const tp2 = tp.tp_levels?.[1];
    return `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;
      margin-top:8px;padding-top:8px;border-top:1px solid ${theme.border}44;font-size:11px">
      <span style="cursor:pointer;color:#90caf9;font-weight:600" onclick="copyPrice(${tp.entry_price},'入场价')" title="点击复制">
        入场 <strong style="font-size:13px">${fmt(tp.entry_price)}</strong>
      </span>
      <span style="color:var(--text3)">›</span>
      ${tp1 ? `<span style="cursor:pointer;color:#80cbc4" onclick="copyPrice(${tp1.price},'TP1')" title="点击复制">
        TP1 <strong>${fmt(tp1.price)}</strong>
        <span style="color:var(--text3);font-size:10px">(+${tp1.dist_pct?.toFixed(1)||'?'}%)</span>
      </span>` : ''}
      ${tp2 ? `<span style="cursor:pointer;color:#4db6ac;font-size:10px" onclick="copyPrice(${tp2.price},'TP2')" title="点击复制">
        TP2 ${fmt(tp2.price)}
      </span>` : ''}
      <span style="color:var(--text3)">|</span>
      <span style="cursor:pointer;color:#ef9a9a" onclick="copyPrice(${tp.sl_price},'止损')" title="点击复制">
        止损 <strong>${fmt(tp.sl_price)}</strong>
        <span style="color:var(--text3);font-size:10px">(-${tp.sl_dist_pct?.toFixed(1)||'?'}%)</span>
      </span>
      <span style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <span style="font-size:13px;font-weight:800;color:${rrCol}">R:R ${tp.rr_tp1?.toFixed(1)||'--'}x</span>
        ${rd.confidence_pct ? `<span style="font-size:11px;color:var(--text3)">置信 ${rd.confidence_pct}%</span>` : ''}
      </span>
    </div>`;
  })() : (isWait ? `<div style="margin-top:7px;padding:7px 10px;background:rgba(0,0,0,0.2);border-radius:5px">
    <div style="font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:600">触发条件</div>
    <div style="font-size:11px;color:#66bb6a;margin-bottom:2px">🟢 ${tp.condition_long || '--'}</div>
    <div style="font-size:11px;color:#ef5350">🔴 ${tp.condition_short || '--'}</div>
  </div>` : '');

  return `<div style="margin:0 0 8px;padding:11px 14px;border-radius:8px;
    background:${theme.bg};border-left:4px solid ${theme.border}">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      ${mainLine}
    </div>
    <div style="margin-top:3px">${subLine}</div>
    ${catalystRow}
    ${priceRow}
  </div>`;
}

/* 共用 HTML 构建函数 */
/* ══════════════════════════════════════════════════════
   入场方案卡片
══════════════════════════════════════════════════════ */
function buildTradePlanCard(rd) {
  const tp = rd && rd.trade_plan;
  if (!tp) return '';

  const col   = tp.color || '#f9a825';
  const fmtP  = p => p == null ? '--' : '$' + Number(p).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
  const fmtP2 = p => p == null ? '--' : '$' + Number(p).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

  // Setup Grade（A/B/C/D）综合评级 — 在 wait 判断之前计算
  const _grade = window._currentGrade = (() => {
    const mtf  = window._mtfConf;
    const ms   = Math.abs(rd.market_structure?.structure_score || 0);
    const conf = rd.confidence_pct || 0;
    const techPct = rd.max_score > 0 ? Math.abs(rd.score) / rd.max_score : 0;
    const mtfAbs  = mtf ? Math.abs(mtf.score) : 0;
    const pts =
      (mtfAbs >= 60 ? 3 : mtfAbs >= 40 ? 2 : mtfAbs >= 20 ? 1 : 0) +
      (techPct >= 0.5 ? 3 : techPct >= 0.35 ? 2 : techPct >= 0.2 ? 1 : 0) +
      (conf  >= 70 ? 3 : conf  >= 55 ? 2 : conf  >= 40 ? 1 : 0) +
      (ms >= 2 ? 2 : ms >= 1 ? 1 : 0);
    if (pts >= 9) return ['A', '#26a69a', '强势信号'];
    if (pts >= 6) return ['B', '#66bb6a', '良好信号'];
    if (pts >= 3) return ['C', '#f9a825', '一般信号'];
    return                ['D', '#ef5350', '信号偏弱'];
  })();
  const _gradeBadge = `<span style="font-size:15px;font-weight:800;color:${_grade[1]};background:${_grade[1]}22;
    width:24px;height:24px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;
    border:1px solid ${_grade[1]}55;margin-right:2px" title="${_grade[2]}">${_grade[0]}</span>`;

  // ── 观望状态 ──────────────────────────────────────────────
  if (tp.direction === 'wait') {
    return `
    <div class="card" style="border-left:3px solid ${col}">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>📋 入场方案</span>
        <div style="display:flex;align-items:center;gap:5px">
          ${_gradeBadge}
          <span style="color:${col};font-weight:700">${tp.direction_cn}</span>
        </div>
      </div>
      <div style="font-size:12px;color:#f9a825;padding:4px 0;line-height:1.5">${tp.reason || ''}</div>
      <div style="margin-top:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:4px">
        <div style="font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em">入场触发条件</div>
        <div style="font-size:11px;color:#4caf50;margin-bottom:3px">🟢 ${tp.condition_long || '--'}</div>
        <div style="font-size:11px;color:#ef5350">🔴 ${tp.condition_short || '--'}</div>
      </div>
    </div>`;
  }

  const isLong  = tp.direction === 'long';
  const rr1     = tp.rr_tp1 != null ? Number(tp.rr_tp1).toFixed(1) : '--';
  const rrCol   = tp.rr_tp1 >= 2.0 ? '#26a69a' : tp.rr_tp1 >= 1.5 ? '#f9a825' : '#ef5350';

  // R:R 所有 TP 汇总
  const allRR = (tp.tp_levels || []).map(t => {
    const c = t.rr >= 2.0 ? '#26a69a' : t.rr >= 1.5 ? '#f9a825' : '#ef5350';
    const distSign = isLong ? '+' : '-';
    const srcBadge = t.source ? (() => {
      const parts = t.source.split('+');
      if (parts.includes('vp_poc'))    return '<span style="font-size:9px;color:#ff9800;margin-left:2px">POC</span>';
      if (parts.some(p=>p.startsWith('fvg'))) return '<span style="font-size:9px;color:#4db6ac;margin-left:2px">FVG</span>';
      if (parts.includes('liq_long') || parts.includes('liq_short'))
        return '<span style="font-size:9px;color:#ef9a9a;margin-left:2px">LIQ</span>';
      return '';
    })() : '';
    return `
    <div style="display:flex;align-items:center;gap:4px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
      <span style="color:var(--text3);font-size:10px;font-weight:700;min-width:24px">${t.tp_label}</span>
      <span style="font-size:13px;font-weight:700;cursor:pointer" onclick="copyPrice(${t.price},'${t.tp_label}')" title="点击复制">${fmtP(t.price)}${srcBadge} <span style="font-size:9px;opacity:.4">⎘</span></span>
      <span style="font-size:11px;color:${isLong ? 'var(--bull)' : 'var(--bear)'}">${distSign}${t.dist_pct != null ? t.dist_pct.toFixed(2) : '--'}%</span>
      <span style="margin-left:auto;background:rgba(255,255,255,0.06);color:${c};padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700">R:R ${t.rr != null ? t.rr.toFixed(1) : '--'}x</span>
    </div>`;
  }).join('');

  // 入场距离标注
  const edPct = tp.entry_dist_pct;
  const edLabel = edPct != null && Math.abs(edPct) > 0.05
    ? `<span style="color:var(--text3);font-size:10px">（当前价 ${isLong ? '-' : '+'}${Math.abs(edPct).toFixed(2)}%）</span>`
    : '';

  // 合并所有警告为单行 badges（替代原来4个大框）
  const _warnBadges = [];
  if (!tp.recommended)   _warnBadges.push(`<span style="color:#ef5350;background:rgba(239,83,80,0.12);padding:1px 6px;border-radius:3px">❌ R:R ${rr1}x 偏低</span>`);
  if (tp.htf_conflict)   _warnBadges.push(`<span style="color:#ce93d8;background:rgba(156,39,176,0.12);padding:1px 6px;border-radius:3px">⚠ 逆势操作</span>`);
  if (tp.is_speculative) _warnBadges.push(`<span style="color:#f9a825;background:rgba(249,168,37,0.12);padding:1px 6px;border-radius:3px">🎲 投机·轻仓≤0.5%</span>`);
  if (tp.near_hunt_warn) _warnBadges.push(`<span style="color:#ffc107;background:rgba(255,193,7,0.10);padding:1px 6px;border-radius:3px">⚡ 临近猎杀区</span>`);
  const _gate = rd?.htf_gate;
  if (_gate?.gated) {
    const _gd = _gate.htf_direction === 'bull' ? '多' : '空';
    _warnBadges.push(`<span style="color:#90a4ae;background:rgba(120,144,156,0.10);padding:1px 6px;border-radius:3px">📐 HTF偏${_gd}</span>`);
  }
  const noRecHtml = _warnBadges.length ? `
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;font-size:10px">
      ${_warnBadges.join('')}
    </div>` : '';
  const htfConflictHtml = '';
  const htfGateHtml = '';
  const specHtml = '';

  // 执行步骤
  const actionStepsHtml = (() => {
    if (tp.direction === 'wait') return '';
    const TF_VALIDITY = {
      '15m':'约30-60分钟','30m':'约1-2小时','1h':'约2-4小时',
      '2h':'约4-8小时','4h':'约8-16小时','8h':'约1-2天','1d':'约2-4天','1w':'约1-2周'
    };
    const validity = TF_VALIDITY[currentTf] || '';
    const tp1 = tp.tp_levels?.[0], tp2 = tp.tp_levels?.[1];
    const iv  = tp.invalidation;
    const entrySuffix = tp.entry_dist_pct != null && Math.abs(tp.entry_dist_pct) > 0.05
      ? `（距现价 ${tp.entry_dist_pct > 0 ? '+' : ''}${tp.entry_dist_pct.toFixed(2)}%）` : '';
    const methodMap = { market:'市价入场', limit:'限价挂单', pullback:'等待回调后入场', wait:'条件触发' };
    const steps = [
      `${methodMap[tp.entry_method] || '挂单'} ${fmtP(tp.entry_price)} ${entrySuffix}`,
      `设置止损 ${fmtP(tp.sl_price)}${tp.sl_label ? ' — ' + tp.sl_label : ''}（幅度 ${tp.sl_dist_pct?.toFixed(2) || '--'}%）`,
      tp1 ? `TP1 ${fmtP(tp1.price)} 触达 → 减仓 ${tp1.partial || '50%'}，剩余止损移至成本 ${fmtP(tp.entry_price)}` : null,
      tp2 ? `TP2 ${fmtP(tp2.price)} 触达 → 清仓剩余仓位` : null,
      iv?.price ? `失效条件：${isLong ? '收盘跌破' : '收盘突破'} ${fmtP(iv.price)} → 立即取消所有挂单` : null,
    ].filter(Boolean);
    const colors = ['#90caf9','#ef9a9a','#80cbc4','#80cbc4','#ffcc80'];
    const nums = ['①','②','③','④','⑤'];
    return `<div style="margin-top:10px;padding:10px 12px;background:rgba(0,0,0,0.18);border-radius:6px;border-top:1px solid var(--border2)">
      <div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">
        📋 执行步骤 <span style="font-weight:400;color:#546e7a">· 信号有效${validity}</span>
      </div>
      ${steps.map((s,i) => `<div style="display:flex;gap:8px;margin-bottom:6px;font-size:11px;line-height:1.5">
        <span style="color:${colors[i]||'var(--text3)'};font-weight:700;min-width:18px;flex-shrink:0">${nums[i]}</span>
        <span style="color:var(--text2)">${s}</span>
      </div>`).join('')}
    </div>`;
  })();

  // 止损猎杀警告已合并进 noRecHtml badges
  const huntHtml = '';

  // 止损类型颜色
  const slTypeBadge = {
    'structural': '<span style="font-size:9px;background:rgba(38,166,154,0.2);color:#4db6ac;padding:1px 4px;border-radius:3px;margin-left:4px">结构型</span>',
    'liq':        '<span style="font-size:9px;background:rgba(239,83,80,0.2);color:#ef9a9a;padding:1px 4px;border-radius:3px;margin-left:4px">清算优化</span>',
    'ob_wall':    '<span style="font-size:9px;background:rgba(41,182,246,0.2);color:#81d4fa;padding:1px 4px;border-radius:3px;margin-left:4px">OB挂单墙</span>',
    'atr':        '<span style="font-size:9px;background:rgba(255,152,0,0.2);color:#ffb74d;padding:1px 4px;border-radius:3px;margin-left:4px">ATR</span>',
  }[tp.sl_type] || '';

  return `
  <div class="card" style="border-left:3px solid ${col}">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;align-items:center;gap:6px">
        <span>📋 入场方案</span>

  const trendClr  = oi.trend === 'rising' ? '#26a69a' : oi.trend === 'falling' ? '#ef5350' : 'var(--text3)';
  const priceIcon = oi.price_trend === 'up' ? '↑' : oi.price_trend === 'down' ? '↓' : '→';
  const scoreClr  = score > 0 ? '#26a69a' : score < 0 ? '#ef5350' : 'var(--text3)';
  const borderClr = score > 0 ? '#26a69a' : score < 0 ? '#ef5350' : '#2a2e39';
  return `<div class="card" style="border-left:3px solid ${borderClr}">

      <div>约 <span style="color:#d1d4dc;font-weight:600">$${oi.usdt_b ?? '-'}B</span></div>
      <div>OI趋势 <span style="color:${trendClr};font-weight:600">${trendIcon} ${oi.trend}</span></div>

      <div>48h均值变化 <span style="color:${trendClr};font-weight:600">${oi.chg_pct != null ? (oi.chg_pct >= 0 ? '+' : '') + oi.chg_pct.toFixed(2) + '%' : '-'}</span></div>

function buildLSRatioCard(rd) {
  const ls = rd?.ls_ratio;
  if (!ls) return '';
  const score    = ls.score ?? 0;
  const scoreClr  = score > 0 ? '#26a69a' : score < 0 ? '#ef5350' : 'var(--text3)';
  const borderClr = score > 0 ? '#26a69a' : score < 0 ? '#ef5350' : '#2a2e39';

  // 多空比例可视化行
  function ratioRow(label, info, chgPct) {
    if (!info || !info.ratio) return '';
    const r     = info.ratio;
    const lPct  = info.long_pct  ?? (r / (1 + r) * 100);
    const sPct  = info.short_pct ?? (100 - lPct);
    const rClr  = r > 1.1 ? '#26a69a' : r < 0.9 ? '#ef5350' : '#d1d4dc';
    const chgHtml = chgPct != null
      ? `<span style="font-size:10px;color:${chgPct >= 0 ? '#26a69a' : '#ef5350'}">${chgPct >= 0 ? '▲' : '▼'}${Math.abs(chgPct).toFixed(1)}%</span>`
      : '';
    return `<div style="margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text3);margin-bottom:3px">
        <span>${label}</span>
        <span style="display:flex;align-items:center;gap:5px">
          多<span style="color:#26a69a;font-weight:600">${lPct.toFixed(1)}%</span>
          空<span style="color:#ef5350;font-weight:600">${sPct.toFixed(1)}%</span>
          比率<span style="color:${rClr};font-weight:700">${r.toFixed(3)}</span>
          ${chgHtml}
        </span>
      </div>
      <div style="height:5px;border-radius:3px;overflow:hidden;background:rgba(239,83,80,0.25)">
        <div style="height:100%;width:${lPct.toFixed(1)}%;background:#26a69a;border-radius:3px 0 0 3px;transition:width .3s"></div>
      </div>
    </div>`;
  }

  const signalsHtml = (ls.signals || []).length > 0
    ? ls.signals.map(s => {
        const c = s.startsWith('⚠️') ? '#ff9800' : s.startsWith('✅') ? '#80cbc4' : s.startsWith('📌') ? '#ba68c8' : 'var(--text2)';
        return `<div style="font-size:11px;padding:2px 0;color:${c};line-height:1.5">${s}</div>`;
      }).join('')
    : `<div style="font-size:11px;color:var(--text3)">无显著信号</div>`;

  const priceDir = ls.price_dir === 'up' ? '↑' : ls.price_dir === 'down' ? '↓' : '→';
  const priceDirClr = ls.price_dir === 'up' ? '#26a69a' : ls.price_dir === 'down' ? '#ef5350' : 'var(--text3)';

  return `<div class="card" style="border-left:3px solid ${borderClr}">
    <div class="card-title">⚖️ 多空比 (Long/Short Ratio)
      <span style="margin-left:8px;font-size:15px;font-weight:700;color:${scoreClr}">${score >= 0 ? '+' : ''}${score}</span>
      <span style="margin-left:auto;font-size:10px;color:${priceDirClr}">价格 ${priceDir} ${ls.price_chg_pct != null ? (ls.price_chg_pct >= 0 ? '+' : '') + ls.price_chg_pct.toFixed(2) + '%' : ''}</span>
    </div>
    ${ratioRow('🏢 大户持仓比', ls.top_position, ls.top_position?.chg_pct)}
    ${ratioRow('👔 大户账户比', ls.top_account, null)}
    ${ratioRow('👥 散户全账户', ls.global, null)}
    <div style="margin-top:6px;padding:6px 8px;background:rgba(0,0,0,0.2);border-radius:4px">
      ${signalsHtml}
    </div>
  </div>`;
}

function buildMacroCard(rd) {
  const mac = rd?.macro;
  if (!mac) return '';
  const score     = mac.score ?? 0;
  const scoreClr  = score > 0 ? '#26a69a' : score < 0 ? '#ef5350' : 'var(--text3)';
  const borderClr = score > 0 ? '#26a69a' : score < 0 ? '#ef5350' : '#2a2e39';

  const mkRow = (label, data) => {
    if (!data) return '';
    const dir = data.direction;
    const clr = dir === 'up' ? '#26a69a' : dir === 'down' ? '#ef5350' : 'var(--text3)';
    const arrow = dir === 'up' ? '↑' : dir === 'down' ? '↓' : '→';
    const chg   = data.chg_pct != null ? (data.chg_pct >= 0 ? '+' : '') + data.chg_pct.toFixed(3) + '%' : '--';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border2);font-size:12px">
      <span style="color:var(--text2)">${label}</span>
      <span style="color:${clr};font-weight:600">${arrow} ${data.price?.toLocaleString() ?? '--'}
        <span style="font-size:10px;font-weight:400;margin-left:4px">${chg}</span>
      </span>
    </div>`;
  };

  const signalsHtml = mac.signals && mac.signals.length
    ? mac.signals.map(s => `<div style="font-size:11px;color:var(--text2);padding:2px 0">${s}</div>`).join('')
    : `<div style="font-size:11px;color:var(--text3)">宏观指标横盘，无方向性信号</div>`;

  const eligibleNote = mac.eligible === false
    ? `<div style="font-size:10px;color:var(--text3);padding:4px 0">当前周期不纳入宏观评分（仅 2小时+ 周期有效）</div>`
    : '';

  const _fngHtml = (() => {
    if (!_fng) return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2)">
      <span style="font-size:10px;color:var(--text3);min-width:60px">恐慌/贪婪</span>
      <span style="font-size:12px;color:var(--text3)">-- <span style="font-size:9px">数据暂不可用</span></span>
    </div>`;
    const { value: fv, label: fl, col: fc } = _fng;
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2)">
      <span style="font-size:10px;color:var(--text3);min-width:60px">恐慌/贪婪</span>
      <div style="flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden">
        <div style="width:${fv}%;height:100%;background:linear-gradient(90deg,#26a69a,#f9a825 50%,#ef5350);border-radius:3px"></div>
      </div>
      <span style="font-size:13px;font-weight:700;color:${fc}">${fv}</span>
      <span style="font-size:10px;color:var(--text3)">${fl}</span>
    </div>`;
  })();

  return `<div class="card" style="border-left:3px solid ${borderClr}">
    <div class="card-title">🌍 宏观关联层 (DXY & NASDAQ)
      <span style="margin-left:8px;font-size:15px;font-weight:700;color:${scoreClr}">${score >= 0 ? '+' : ''}${score}</span>
    </div>
    ${_fngHtml}
    ${eligibleNote}
    ${mkRow('🇺🇸 DXY（美元指数）', mac.dxy)}
    ${mkRow('📈 NASDAQ（^IXIC）', mac.nasdaq)}
    <div style="margin-top:6px;padding:6px 8px;background:rgba(0,0,0,0.2);border-radius:4px">
      ${signalsHtml}
    </div>
    <div style="margin-top:5px;font-size:9px;color:var(--text3);font-style:italic">
      BTC与DXY负相关（美元强→BTC弱）；与NASDAQ正相关（风险偏好↑→BTC强）。仅2H+周期参与评分。
    </div>
  </div>`;
}

function buildMonteCarloCard(rd) {
  const tp = rd?.trade_plan;
  const mc = tp?.monte_carlo;
  if (!mc || mc.error || !tp || !['long','short'].includes(tp.direction)) return '';

  const isLong   = tp.direction === 'long';
  const tpLevels = tp.tp_levels || [];
  const fmtP     = p => p != null ? '$' + p.toLocaleString('en-US', {maximumFractionDigits: 0}) : '--';
  const fmtPct   = p => p != null ? (p >= 0 ? '+' : '') + p.toFixed(2) + '%' : '--';

  // 概率水平条
  const probBar = (pct, color) => {
    const w = Math.max(2, Math.min(100, pct));
    return `<div style="height:6px;border-radius:3px;background:rgba(255,255,255,0.06);margin-top:3px">
      <div style="height:6px;border-radius:3px;background:${color};width:${w}%;transition:width .3s"></div>
    </div>`;
  };

  // TP 行
  const probColors = ['#26a69a', '#66bb6a', '#a5d6a7'];
  const probs      = [mc.prob_tp1, mc.prob_tp2, mc.prob_tp3];
  const tpRows = tpLevels.map((t, i) => {
    const prob = probs[i] ?? 0;
    const clr  = probColors[i] || '#26a69a';
    return `<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:11px">
        <span style="color:var(--text2)">${t.tp_label} <span style="color:${clr};font-weight:600">${fmtP(t.price)}</span></span>
        <span style="color:${clr};font-weight:700;font-size:13px">${prob}%</span>
      </div>
      ${probBar(prob, clr)}
    </div>`;
  }).join('');

  // SL 行
  const slRow = `<div style="margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:11px">
      <span style="color:var(--text2)">触及 SL <span style="color:#ef5350;font-weight:600">${fmtP(tp.sl_price)}</span></span>
      <span style="color:#ef5350;font-weight:700;font-size:13px">${mc.prob_sl}%</span>
    </div>
    ${probBar(mc.prob_sl, '#ef5350')}
  </div>`;

  // 未触及行
  const noneRow = mc.prob_none > 0 ? `<div style="margin-bottom:4px">
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3)">
      <span>在 ${mc.horizon_bars} 根K线内未触及任何目标</span>
      <span>${mc.prob_none}%</span>
    </div>
  </div>` : '';

  // 终价分位数可视化
  const pMin = Math.min(mc.p5, tp.sl_price || mc.p5);
  const pMax = Math.max(mc.p95, (tpLevels[tpLevels.length-1]?.price || mc.p95));
  const pRange = pMax - pMin || 1;
  const toX = p => Math.max(0, Math.min(100, (p - pMin) / pRange * 100));
  const quantileBar = `<div style="position:relative;height:14px;background:rgba(255,255,255,0.04);border-radius:4px;margin:10px 0 6px">
    <!-- IQR 区间 P25-P75 -->
    <div style="position:absolute;top:0;bottom:0;left:${toX(mc.p25).toFixed(1)}%;width:${Math.max(0,toX(mc.p75)-toX(mc.p25)).toFixed(1)}%;background:rgba(255,152,0,0.2);border-radius:3px"></div>
    <!-- 中位线 -->
    <div style="position:absolute;top:0;bottom:0;left:${toX(mc.p50).toFixed(1)}%;width:2px;background:#f9a825;border-radius:1px"></div>
    <!-- P5/P95 点 -->
    <div style="position:absolute;top:3px;bottom:3px;left:${toX(mc.p5).toFixed(1)}%;width:3px;background:#ef5350;border-radius:1px" title="P5"></div>
    <div style="position:absolute;top:3px;bottom:3px;left:${toX(mc.p95).toFixed(1)}%;width:3px;background:#26a69a;border-radius:1px" title="P95"></div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3)">
    <span>P5 ${fmtP(mc.p5)}</span>
    <span>P25 ${fmtP(mc.p25)}</span>
    <span style="color:#f9a825">中位 ${fmtP(mc.p50)}</span>
    <span>P75 ${fmtP(mc.p75)}</span>
    <span>P95 ${fmtP(mc.p95)}</span>
  </div>`;

  // 黑天鹅 & EV
  const bsPrice = isLong ? mc.p5 : mc.p95;
  const bsMov   = tp.entry_price ? ((bsPrice - tp.entry_price) / tp.entry_price * 100).toFixed(1) : '--';
  const bsLabel = isLong ? `5% 概率跌至 ${fmtP(bsPrice)}（${bsMov}%）`
                         : `5% 概率涨至 ${fmtP(bsPrice)}（+${Math.abs(bsMov)}%）`;
  const evClr   = mc.ev_pct >= 0 ? '#26a69a' : '#ef5350';
  const evNote  = mc.ev_pct >= 0.1 ? '正期望值 ✅' : mc.ev_pct <= -0.1 ? '负期望值 ⚠️ 审慎' : '期望值接近零 ↔️';

  // 分布特征
  const skewDesc  = mc.skewness < -0.3 ? '左偏（崩跌概率偏高）'
                  : mc.skewness >  0.3 ? '右偏（拉升概率偏高）' : '近似对称';
  const kurtDesc  = mc.kurt_excess > 1.0 ? '胖尾（极端事件偏多）'
                  : mc.kurt_excess < -0.5 ? '薄尾（极端事件偏少）' : '正常';

// 预计算 MTF 共振分（独立函数，供 buildTradePlanCard 等提前引用）
function computeMTFConfluence() {
  const TF_WEIGHTS = { '1w': 4.0, '1d': 3.0, '8h': 2.5, '4h': 2.0, '2h': 1.5, '1h': 1.2, '30m': 1.0, '15m': 0.8 };
  let wSum = 0, wScoreSum = 0, total = 0, aligned = 0;
  Object.keys(TF_WEIGHTS).forEach(tf => {
    const rd = analysisData[tf]?.rd;
    if (!rd) return;
    const w = TF_WEIGHTS[tf];
    wScoreSum += (rd.score / (rd.max_score || 21)) * w;
    wSum += w;
    total++;
  });
  const score = wSum > 0 ? Math.round(wScoreSum / wSum * 100) : 0;
  Object.keys(TF_WEIGHTS).forEach(tf => {
    const rd = analysisData[tf]?.rd;
    if (!rd) return;
    if (score >= 0 ? rd.score > 0 : rd.score < 0) aligned++;
  });
  return { score, total, aligned, pct: total > 0 ? Math.round(aligned / total * 100) : 0 };
}

function updateMobileSignals() {
  const panel = document.getElementById('panel-signals');

  const matrixHTML = buildMTFMatrix();

  let gridHTML = '<div class="signals-grid">';
  TF_LIST.forEach(tf => {
    const data = analysisData[tf]; if (!data) return;
    const rd  = data.rd;
    const cls = sc(rd.score);
    const oc  = rd.overall_color || 'var(--neutral)';
    const bw  = Math.max(0, rd.score) / rd.max_score * 100;
    const rw  = Math.max(0,-rd.score) / rd.max_score * 100;
    gridHTML += `
      <div class="sig-card" onclick="switchTf('${tf}');switchMobileTab('chart',document.querySelector('[data-tab=chart]'))">
        <div class="sig-card-tf">${TF_LABELS_FULL[tf]||tf}</div>
        <div class="sig-card-score" style="color:${oc}">${rd.score>=0?'+':''}${rd.score}</div>
        <div class="sig-card-text" style="color:${oc}">${rd.overall.split('(')[0].trim()}</div>
        <div class="sig-bar">
          <div class="sig-bar-bull" style="width:${bw.toFixed(1)}%"></div>
          <div class="sig-bar-bear" style="width:${rw.toFixed(1)}%"></div>
        </div>
      </div>`;
  });
  gridHTML += '</div>';

  // 当前周期 S/R 汇总
  const cur = analysisData[currentTf];
  let srHTML = '';
  if (cur) {
    const resS = [...(cur.resistances||[])].sort((a,b)=>b.price-a.price);
    const supS = [...(cur.supports||[])].sort((a,b)=>b.price-a.price);
    const mkRow = (item, type) => {
      const col    = type === 'res' ? 'var(--bear)' : 'var(--bull)';
      const label  = type === 'res' ? '阻力' : '支撑';
      const distStr = type === 'res' ? `+${item.dist_pct.toFixed(2)}%` : `-${item.dist_pct.toFixed(2)}%`;
      const scoreBar = `<div style="width:30px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:4px"><div style="width:${Math.min(100,(item.score||0)/8*100).toFixed(0)}%;height:100%;background:${col}"></div></div>`;
      return `<div class="sr-row" style="flex-direction:column;align-items:flex-start;padding:4px 0">
        <div style="display:flex;justify-content:space-between;width:100%">
          <span style="color:${col}">${label}</span>
          <span>${fmt(item.price)}</span>
          <span style="color:${col}">${distStr}</span>
          <span>${scoreBar} ${srBadge(item.source)}</span>
        </div>
        ${item.reason ? `<div style="font-size:10px;color:var(--text3);margin-top:2px;padding-left:4px">${item.reason}</div>` : ''}
      </div>`;
    };
    srHTML = `<div class="sr-section">
      <h3>当前周期 [${TF_LABELS_FULL[currentTf]||currentTf}] 支撑/阻力</h3>
      ${resS.map(r=>mkRow(r,'res')).join('')}
      ${supS.map(s=>mkRow(s,'sup')).join('')}
    </div>`;
  }
  panel.innerHTML = matrixHTML + gridHTML + srHTML;
}

/* ══════════════════════════════════════════════════════
   成交量异常检测（K线拉取后调用）
══════════════════════════════════════════════════════ */
function checkVolumeAnomaly(candles, tf) {
  const tag = document.getElementById('volSpikeTag');
  if (!tag || !candles || candles.length < 25) { if (tag) tag.style.display = 'none'; return; }
  const vols = candles.map(c => c.v).filter(v => v > 0);
  const avgVol = vols.slice(-21, -1).reduce((a, b) => a + b, 0) / 20;  // 最近20根均量
  const lastVol = vols[vols.length - 1];
  const ratio   = avgVol > 0 ? lastVol / avgVol : 0;

  if (ratio >= 2.5) {
    tag.style.display = '';
    tag.style.background = ratio >= 4 ? '#ef535033' : '#f9a82522';
    tag.style.color      = ratio >= 4 ? '#ef5350'   : '#f9a825';
    tag.style.border     = `1px solid ${ratio >= 4 ? '#ef535066' : '#f9a82566'}`;
    tag.textContent      = `⚡ 量能异常 ${ratio.toFixed(1)}×`;
    // 仅在量能极端时 toast（避免频繁打扰）
    const key = `vol_${tf}_${candles.length}`;
    if (ratio >= 4 && Date.now() - (_alertTS[key] || 0) > 5 * 60 * 1000) {
      _alertTS[key] = Date.now();
      const isUp = candles[candles.length - 1].c > candles[candles.length - 1].o;
      showToast(`⚡ ${TF_LABELS[tf]} 量能异常 ${ratio.toFixed(1)}× 均值 — ${isUp ? '放量上涨' : '放量下跌'}`, isUp ? 'bull' : 'bear');
    }
  } else {
    tag.style.display = 'none';
  }
}

async function fetchKlinesAndRender(tf) {
  showChartLoading(true);
  try {
    const r = await fetch(`/api/klines/${tf}?symbol=${currentSymbol}`);
    if (!r.ok) { showChartLoading(false); return; }
    const d = await r.json();
    const ctl = document.getElementById('chartTfLabel');
    if (ctl) ctl.textContent = TF_LABELS_FULL[tf] || tf;
    const s = document.getElementById('chartStatus');
    if (s) s.textContent = `${d.candles.length} 根K线`;
    // 将 klines 接口的新字段同步写入 analysisData 缓存
    if (analysisData[tf]) {
      if (d.fvg_zones      !== undefined) analysisData[tf].fvg_zones       = d.fvg_zones;
      if (d.volume_profile !== undefined) analysisData[tf].volume_profile   = d.volume_profile;
      if (d.market_structure !== undefined) analysisData[tf].market_structure = d.market_structure;
    }
    // 缓存K线供叠加层重绘
    _lastKlines = { candles: d.candles, supports: d.supports, resistances: d.resistances, fib: d.fib, tf };
    // 桌面：6面板完整图
    renderDesktopChart(d.candles, d.supports, d.resistances, d.fib, tf);
    // 手机：主K线图（2面板）
    renderMainChart(d.candles, d.supports, d.resistances, d.fib, tf);
    showChartLoading(false);
    // ── 成交量异常检测 ─────────────────────────────────────
    checkVolumeAnomaly(d.candles, tf);
    // 如果手机副图正在显示，同步渲染
    if (isMobile && mobileTab === 'sub') renderSubChart(d.candles);
  } catch(e) { showChartLoading(false); console.warn('klines fetch failed', e); showToast('⚠ K线数据获取失败，请检查网络', 'bear'); }
}

async function fetchSubChart(tf) {
  const sl = document.getElementById('mSubLoading');
  if (sl) sl.style.display = 'flex';
  try {
    const r = await fetch(`/api/klines/${tf}?symbol=${currentSymbol}`);
    if (!r.ok) { if(sl) sl.style.display='none'; return; }
    const d = await r.json();
    renderSubChart(d.candles);
    if (sl) sl.style.display = 'none';
  } catch(e) { if(sl) sl.style.display='none'; console.warn(e); }
}

/* ══════════════════════════════════════════════════════
   共用：Y轴范围计算 + Shape 过滤（桌面和手机共用）
══════════════════════════════════════════════════════ */
function calcYRange(candles) {
  const H = candles.map(c=>c.h).filter(v=>v!=null&&!isNaN(v));
  const L = candles.map(c=>c.l).filter(v=>v!=null&&!isNaN(v));
  const pMin = Math.min(...L), pMax = Math.max(...H);
  const pad  = (pMax - pMin) * 0.05;
  return [pMin - pad, pMax + pad];
}

function buildSRShapes(candles, supports, resistances, fib, yRange, stopHuntZones, fvgZones, volumeProfile, tradePlan, rd) {
  const T  = candles.map(c=>c.t);
  const x0 = T[0], x1 = T[T.length-1];
  const [yMin, yMax] = yRange;
  const inView = price => price >= yMin * 0.9 && price <= yMax * 1.1;
  const shapes = [], anns = [];

  // ── 流动性猎杀区（渲染在最底层，半透明色带）────────────
  (stopHuntZones || []).slice(0, 5).forEach(z => {
    const isLong   = z.type === 'long_stop_hunt';
    const visible  = inView(z.hunt_zone_high) || inView(z.hunt_zone_low);
    if (!visible) return;
    const alpha    = 0.04 + Math.min(0.08, z.magnetic_strength * 0.008);
    // 猎杀区色带
    shapes.push({
      type:'rect', xref:'x', yref:'y', x0, x1,
      y0: z.hunt_zone_low, y1: z.hunt_zone_high,
      fillcolor: isLong ? `rgba(239,83,80,${alpha})` : `rgba(38,166,154,${alpha})`,
      line:{ color: isLong ? 'rgba(239,83,80,0.25)' : 'rgba(38,166,154,0.25)', width:0.8 },
      layer:'below'
    });
    // 猎杀目标虚线（价格最可能触达的深度）
    if (inView(z.hunt_target)) {
      shapes.push({
        type:'line', xref:'x', yref:'y', x0, x1,
        y0: z.hunt_target, y1: z.hunt_target,
        line:{ color: isLong ? 'rgba(239,83,80,0.55)' : 'rgba(38,166,154,0.55)', width:1, dash:'dashdot' }
      });
      const probTag = z.hunt_probability === '高' ? '🎯' : '◎';
      anns.push({
        xref:'paper', yref:'y', x:1.01, y:z.hunt_target,
        text: `${probTag}猎${Math.round(z.hunt_target).toLocaleString()}`,
        showarrow:false, font:{color: isLong ? '#ef5350' : '#26a69a', size:9}, xanchor:'left'
      });
    }
    // 推荐挂单点（绿/红小三角标注）
    if (inView(z.recommended_entry)) {
      anns.push({
        xref:'paper', yref:'y', x:1.01, y:z.recommended_entry,
        text: isLong ? `▲ 挂${Math.round(z.recommended_entry).toLocaleString()}` : `▼ 挂${Math.round(z.recommended_entry).toLocaleString()}`,
        showarrow:false, font:{color: isLong ? '#26a69a' : '#ef5350', size:9, family:'monospace'}, xanchor:'left'
      });
    }
  });

  if (_chartOverlays.sr !== false) {
    (resistances||[]).filter(r=>inView(r.price)).forEach(r => {
      shapes.push({type:'line',xref:'x',yref:'y',x0,x1,y0:r.price,y1:r.price,line:{color:'rgba(239,83,80,0.7)',width:1.2,dash:'dot'}});
      anns.push({xref:'paper',yref:'y',x:1.01,y:r.price,text:`阻 ${Math.round(r.price).toLocaleString()}`,showarrow:false,font:{color:'#ef5350',size:10},xanchor:'left'});
    });
    (supports||[]).filter(s=>inView(s.price)).forEach(s => {
      shapes.push({type:'line',xref:'x',yref:'y',x0,x1,y0:s.price,y1:s.price,line:{color:'rgba(38,166,154,0.7)',width:1.2,dash:'dot'}});
      anns.push({xref:'paper',yref:'y',x:1.01,y:s.price,text:`撑 ${Math.round(s.price).toLocaleString()}`,showarrow:false,font:{color:'#26a69a',size:10},xanchor:'left'});
    });
  }
  const fibColors    = ['#b0bec5','#80cbc4','#ffcc02','#ff9800','#ff5722','#e91e63','#9c27b0'];
  // 延伸位专用颜色（金色系，从浅到深）
  const extColors    = ['#ffe082','#ffd54f','#ffca28','#ffc107','#ffb300'];
  const retraceLevels = (fib||[]).filter(f => !f.ext);
  const extLevels     = (fib||[]).filter(f =>  f.ext);
  retraceLevels.sort((a,b)=>b.price-a.price).filter(f=>inView(f.price)).forEach((f,i) => {
    const fc = fibColors[i%fibColors.length];
    shapes.push({type:'line',xref:'x',yref:'y',x0,x1,y0:f.price,y1:f.price,line:{color:fc,width:0.8,dash:'dash'}});
    anns.push({xref:'paper',yref:'y',x:0,y:f.price,text:f.label,showarrow:false,font:{color:fc,size:9},xanchor:'right'});
  });
  extLevels.sort((a,b)=>a.price-b.price).filter(f=>inView(f.price)).forEach((f,i) => {
    const ec = extColors[i%extColors.length];
    shapes.push({type:'line',xref:'x',yref:'y',x0,x1,y0:f.price,y1:f.price,line:{color:ec,width:1.0,dash:'longdash'}});
    anns.push({xref:'paper',yref:'y',x:0,y:f.price,text:f.label,showarrow:false,font:{color:ec,size:9,family:'monospace'},xanchor:'right'});
  });

  // ── Fair Value Gap 色带（价格失衡区）────────────────────
  if (_chartOverlays.fvg !== false) (fvgZones || []).slice(0, 6).forEach(fvg => {
    if (!inView(fvg.mid)) return;
    const isBull = fvg.type === 'bullish_fvg';
    const alpha  = (0.06 - fvg.filled_pct * 0.0005).toFixed(2);  // 填充越多颜色越淡
    shapes.push({
      type:'rect', xref:'x', yref:'y', x0, x1,
      y0: fvg.bottom, y1: fvg.top,
      fillcolor: isBull ? `rgba(38,166,154,${alpha})` : `rgba(239,83,80,${alpha})`,
      line:{ color: isBull ? 'rgba(38,166,154,0.3)' : 'rgba(239,83,80,0.3)', width:0.6, dash:'dot' },
      layer:'below'
    });
    // FVG 中点虚线（机构挂单核心位）
    shapes.push({
      type:'line', xref:'x', yref:'y', x0, x1,
      y0: fvg.mid, y1: fvg.mid,
      line:{ color: isBull ? 'rgba(38,166,154,0.6)' : 'rgba(239,83,80,0.6)', width:0.8, dash:'dot' }
    });
    anns.push({
      xref:'paper', yref:'y', x:0, y:fvg.mid,
      text: isBull ? '🔲↑' : '🔲↓',
      showarrow:false, font:{color: isBull ? '#4db6ac' : '#ef9a9a', size:9}, xanchor:'right'
    });
  }); // end FVG

  // ── Volume Profile 关键线（POC / VAH / VAL）───────────────
  if (_chartOverlays.vp !== false && volumeProfile && volumeProfile.poc) {
    const vpLines = [
      { price: volumeProfile.poc, color:'rgba(255,152,0,0.85)', label:'POC', w:1.5 },
      { price: volumeProfile.vah, color:'rgba(255,183,77,0.5)',  label:'VAH', w:0.8 },
      { price: volumeProfile.val, color:'rgba(255,183,77,0.5)',  label:'VAL', w:0.8 },
    ];
    vpLines.forEach(vl => {
      if (!vl.price || !inView(vl.price)) return;
      shapes.push({
        type:'line', xref:'x', yref:'y', x0, x1,
        y0: vl.price, y1: vl.price,
        line:{ color: vl.color, width: vl.w, dash:'dashdot' }
      });
      anns.push({
        xref:'paper', yref:'y', x:1.01, y:vl.price,
        text: `${vl.label} ${Math.round(vl.price).toLocaleString()}`,
        showarrow:false, font:{color:'#ffb74d', size:9}, xanchor:'left'
      });
    });
  }

  // ── 交易计划关键价位线 ──────────────────────────────────
  if (_chartOverlays.plan !== false && tradePlan) {
    const tp = tradePlan;
    const planLines = [];
    if (tp.entry_price)  planLines.push({ price: tp.entry_price,  color:'rgba(100,181,246,0.9)',  label:`入场 ${Math.round(tp.entry_price).toLocaleString()}`,  dash:'dashdot', w:1.5 });
    if (tp.stop_loss)    planLines.push({ price: tp.stop_loss,    color:'rgba(239,83,80,0.9)',    label:`止损 ${Math.round(tp.stop_loss).toLocaleString()}`,    dash:'dot',     w:1.2 });
    if (tp.take_profit_1) planLines.push({ price: tp.take_profit_1, color:'rgba(102,187,106,0.85)', label:`TP1 ${Math.round(tp.take_profit_1).toLocaleString()}`, dash:'dot',   w:1.0 });
    if (tp.take_profit_2) planLines.push({ price: tp.take_profit_2, color:'rgba(102,187,106,0.85)', label:`TP2 ${Math.round(tp.take_profit_2).toLocaleString()}`, dash:'dot',   w:1.0 });
    if (tp.take_profit_3) planLines.push({ price: tp.take_profit_3, color:'rgba(102,187,106,0.85)', label:`TP3 ${Math.round(tp.take_profit_3).toLocaleString()}`, dash:'dot',   w:1.0 });
    planLines.forEach(pl => {
      if (!pl.price || !inView(pl.price)) return;
      shapes.push({ type:'line', xref:'x', yref:'y', x0, x1,
        y0: pl.price, y1: pl.price,
        line:{ color: pl.color, width: pl.w, dash: pl.dash }
      });
      anns.push({ xref:'paper', yref:'y', x:1.01, y:pl.price,
        text: pl.label, showarrow:false,
        font:{ color: pl.color, size:9, family:'monospace' }, xanchor:'left'
      });
    });
  }

  // ── 市场结构事件（BOS / CHoCH）────────────────────────────
  if (_chartOverlays.ms !== false) {
    const msEvents = rd?.market_structure?.events || [];
    msEvents.slice(-6).forEach(ev => {
      if (!ev?.price || !inView(ev.price)) return;
      const isBull  = ev.type?.includes('UP');
      const isChoch = ev.type?.startsWith('CHoCH');
      const col = isChoch ? (isBull ? '#4db6ac' : '#ef9a9a')
                          : (isBull ? '#26a69a' : '#ef5350');
      shapes.push({
        type:'line', xref:'x', yref:'y', x0, x1,
        y0: ev.price, y1: ev.price,
        line:{ color:col, width:1, dash: isChoch ? 'dot' : 'dash' },
        opacity: 0.5
      });
      const label = (ev.type||'').replace('_UP','↑').replace('_DOWN','↓');
      anns.push({
        xref:'paper', yref:'y', x:0, y:ev.price,
        xanchor:'left', yanchor:'middle',
        text: `${isChoch ? '◈' : '◆'} ${label}`,
        showarrow:false,
        font:{ size:9, color:col },
        bgcolor:'rgba(18,22,34,0.7)'
      });
    });
  }

  return { shapes, anns, x0, x1 };
}

/* ══════════════════════════════════════════════════════
   桌面端：完整6面板图（原有逻辑完整保留）
══════════════════════════════════════════════════════ */
function renderDesktopChart(candles, supports, resistances, fib, tf) {
  const el = document.getElementById('chart-desktop');
  if (!el) return;
  const T = candles.map(c=>c.t), O=candles.map(c=>c.o), H=candles.map(c=>c.h);
  const L = candles.map(c=>c.l), C=candles.map(c=>c.c), V=candles.map(c=>c.v);
  const get = key => noNaN(candles.map(c=>c[key]));
  // OFI 染色：用主动买卖比例（ofi）替代K线涨跌色，强度反映失衡程度
  const volColors = candles.map(c => {
    const o = c.ofi != null ? c.ofi : (c.c >= c.o ? 0.5 : -0.5);
    const a = (0.35 + 0.55 * Math.abs(o)).toFixed(2);
    return o >= 0 ? `rgba(38,166,154,${a})` : `rgba(239,83,80,${a})`;
  });
  const macdHistColors = candles.map(c=>(c.macd_hist||0)>=0?'#26a69a':'#ef5350');

  const [yMin, yMax] = calcYRange(candles);
  const _rdDesktop   = analysisData[tf]?.rd;
  const _tfDataDesk  = analysisData[tf];
  const { shapes, anns, x0, x1 } = buildSRShapes(
    candles, supports, resistances, fib, [yMin, yMax],
    _rdDesktop?.stop_hunt_zones,
    _tfDataDesk?.fvg_zones,
    _tfDataDesk?.volume_profile,
    _rdDesktop?.trade_plan,
    _rdDesktop
  );

  [70,30].forEach(lv => shapes.push({type:'line',xref:'x5',yref:'y5',x0,x1,y0:lv,y1:lv,line:{color:lv===70?'rgba(239,83,80,0.4)':'rgba(38,166,154,0.4)',width:1,dash:'dash'}}));

/* ══════════════════════════════════════════════════════
   一键复制信号摘要
══════════════════════════════════════════════════════ */
function copySignalSummary() {
  const data = analysisData[currentTf];
  if (!data) return;
  const rd  = data.rd;
  const tp  = rd.trade_plan;
  const mtf = window._mtfConf;
  const g   = window._currentGrade;
  const fmt = p => p != null ? '$' + Math.round(p).toLocaleString('en-US') : '--';

  const lines = [
    `📊 ${currentSymbol} | ${TF_LABELS_FULL[currentTf]||currentTf}`,
    `方向: ${rd.overall || '--'}  评分: ${rd.score>=0?'+':''}${rd.score}/${rd.max_score}${g ? '  评级: '+g[0] : ''}`,
  ];
  if (tp && ['long','short'].includes(tp.direction)) {
    lines.push(`入场: ${fmt(tp.entry_price)}  SL: ${fmt(tp.sl_price)}  止损幅: ${tp.sl_dist_pct?.toFixed(2)||'--'}%`);
    const tpLvl = tp.tp_levels || [];
    if (tpLvl[0]) lines.push(`TP1: ${fmt(tpLvl[0].price)}  R:R ${tpLvl[0].rr?.toFixed(1)||'--'}`);
    if (tpLvl[1]) lines.push(`TP2: ${fmt(tpLvl[1].price)}  R:R ${tpLvl[1].rr?.toFixed(1)||'--'}`);
  }
  if (mtf) lines.push(`MTF共振: ${mtf.aligned}/${mtf.total}周期  共振分: ${mtf.score>=0?'+':''}${mtf.score}`);
  if (rd.confidence_pct != null) lines.push(`历史置信度: ${rd.confidence_pct}% ${rd.confidence_level||''}`);
  if (_fng) lines.push(`恐慌/贪婪: ${_fng.value} · ${_fng.label}`);
  lines.push(`时间: ${new Date().toLocaleString('zh-CN',{hour12:false})}`);

  const text = lines.join('\n');
  const copy = () => { showToast('📋 信号摘要已复制', 'bull'); };
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(copy).catch(() => {
      const ta = Object.assign(document.createElement('textarea'), {value: text, style: 'position:fixed;opacity:0'});
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); copy();
    });
  }
}

   恐慌/贪婪指数（alternative.me · 每4h刷新）
══════════════════════════════════════════════════════ */
async function fetchFearGreed() {
  try {
    const r = await fetch('https://api.alternative.me/fng/?limit=1');
    if (!r.ok) return;
    const d = await r.json();
    const v = +d.data[0].value;
    const l = d.data[0].value_classification;
    const col = v >= 75 ? '#ef5350' : v >= 55 ? '#f9a825' : v >= 45 ? '#78909c' : v >= 25 ? '#4db6ac' : '#26a69a';
    _fng = { value: v, label: l, col };
  } catch {}
}

/* ══════════════════════════════════════════════════════
   大单流水（/api/trades/recent · 每60s刷新）
══════════════════════════════════════════════════════ */
async function fetchWhaleTrades() {
  try {
    const r = await fetch(`/api/trades/recent?symbol=${currentSymbol}&min_usdt=100000`);
    if (!r.ok) return;
    const d = await r.json();
    _whaleTrades = (d.trades || []).slice(0, 10);
    // 如果分析面板已渲染则更新大单卡片
    const el = document.getElementById('whaleTradesCard');
    if (el) el.innerHTML = _buildWhaleRows();
  } catch {}
}

function _buildWhaleRows() {
  if (!_whaleTrades.length) return '<div style="font-size:11px;color:var(--text3);text-align:center;padding:8px 0">暂无大单数据</div>';
  const now = Date.now();
  return _whaleTrades.map(t => {
    const age    = now - t.time;
    const ageStr = age < 60000 ? `${Math.round(age/1000)}s` : age < 3600000 ? `${Math.round(age/60000)}m` : `${Math.round(age/3600000)}h`;
    const isBuy  = t.is_buyer;
    const col    = isBuy ? '#26a69a' : '#ef5350';
    const icon   = isBuy ? '▲' : '▼';
    const usdtK  = t.usdt >= 1000000 ? (t.usdt/1000000).toFixed(2)+'M' : Math.round(t.usdt/1000)+'K';
    return `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border2);font-size:11px">
      <span style="color:var(--text3);min-width:24px;font-size:10px">${ageStr}</span>
      <span style="color:${col};font-weight:700;font-size:12px">${icon}</span>
      <span style="color:${col};font-weight:600;flex:1">${isBuy ? '主动买' : '主动卖'}</span>
      <span style="color:var(--text)">${t.qty.toFixed(2)} BTC</span>
      <span style="color:${col};font-weight:600;min-width:44px;text-align:right">$${usdtK}</span>
    </div>`;
  }).join('');
}

function buildWhaleTradesCard() {
  return `<div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>🐋 大单流水 <span style="font-size:10px;color:var(--text3);font-weight:400">&gt;$100K</span></span>
      <span style="font-size:10px;color:var(--text3)">60s 刷新</span>
    </div>
    <div id="whaleTradesCard">${_buildWhaleRows()}</div>
  </div>`;
}

async function init() {
  // 恢复上次选中周期
  const savedTf = localStorage.getItem('tf');
  if (savedTf && TF_LIST.includes(savedTf)) currentTf = savedTf;
  initSymbolSelects();
  buildMobileTfBar();
  fetchPrice();
  fetchFunding();
  fetchObLive();
  fetchOnchain();
  fetchFearGreed();
  fetchWhaleTrades();
  updateSessionClock();
  await pollStatus();
  setInterval(pollStatus, 5000);
  setInterval(fetchPrice, 10000);
  setInterval(fetchFunding, 30000);
  setInterval(fetchObLive, 30000);
  setInterval(fetchWhaleTrades, 60000);
  setInterval(updateSessionClock, 60000);
  setInterval(updateAnalysisAge, 15000);
  setInterval(fetchOnchain, 1800000);
  setInterval(fetchFearGreed, 14400000); // 每4小时

  // 键盘快捷键：1-8 切换时间框架
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    const tfMap = {'1':'15m','2':'30m','3':'1h','4':'2h','5':'4h','6':'8h','7':'1d','8':'1w'};
    if (tfMap[e.key]) switchTf(tfMap[e.key]);
  });

  // 移动端：图表区左右滑动切换周期
  let _touchX = 0, _touchY = 0;
  const _swipeEl = document.getElementById('appMain');
  if (_swipeEl) {
    _swipeEl.addEventListener('touchstart', e => {
      _touchX = e.touches[0].clientX;
      _touchY = e.touches[0].clientY;
    }, { passive: true });
    _swipeEl.addEventListener('touchend', e => {
      if (mobileTab === 'chart' || mobileTab === 'sub') return; // 图表 tab 交给 Plotly 处理
      const dx = e.changedTouches[0].clientX - _touchX;
      const dy = e.changedTouches[0].clientY - _touchY;
      if (Math.abs(dx) < 55 || Math.abs(dy) > Math.abs(dx) * 0.8) return; // 非横向滑动忽略
      const idx = TF_LIST.indexOf(currentTf);
      if (dx < 0 && idx < TF_LIST.length - 1) switchTf(TF_LIST[idx + 1]); // 左滑 → 更长周期
      else if (dx > 0 && idx > 0)              switchTf(TF_LIST[idx - 1]); // 右滑 → 更短周期
    }, { passive: true });
  }

  // 初始化叠加层按钮激活状态
  initOverlayBtns();
}

init();
</script>
<div id="toast-container"></div>
