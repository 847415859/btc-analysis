<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#131722"/>
  <!-- K线柱 -->
  <rect x="80"  y="200" width="40" height="180" rx="4" fill="#26a69a" opacity=".9"/>
  <rect x="160" y="140" width="40" height="240" rx="4" fill="#26a69a" opacity=".9"/>
  <rect x="240" y="170" width="40" height="160" rx="4" fill="#ef5350" opacity=".9"/>
  <rect x="320" y="120" width="40" height="200" rx="4" fill="#26a69a" opacity=".9"/>
  <rect x="400" y="100" width="40" height="180" rx="4" fill="#26a69a" opacity=".9"/>
  <!-- 影线 -->
  <line x1="100" y1="160" x2="100" y2="420" stroke="#26a69a" stroke-width="6" opacity=".7"/>
  <line x1="180" y1="100" x2="180" y2="420" stroke="#26a69a" stroke-width="6" opacity=".7"/>
  <line x1="260" y1="130" x2="260" y2="370" stroke="#ef5350" stroke-width="6" opacity=".7"/>
  <line x1="340" y1="80"  x2="340" y2="360" stroke="#26a69a" stroke-width="6" opacity=".7"/>
  <line x1="420" y1="60"  x2="420" y2="320" stroke="#26a69a" stroke-width="6" opacity=".7"/>
  <!-- MA线 -->
  <polyline points="80,340 160,280 240,250 320,200 420,160"
            fill="none" stroke="#f9a825" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/>
</svg>
